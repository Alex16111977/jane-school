<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabeln | NeoStudy</title>
    <link rel="stylesheet" href="css/style.css?v=10">
    <link rel="stylesheet" href="css/englisch.css?v=10">
    <style>
        html { background: #0a0a14; }

        /* ===== LEVEL SELECTOR ===== */
        .level-tabs {
            display: flex;
            gap: 0.8rem;
            margin: 1rem 0 1.5rem;
            flex-wrap: wrap;
        }
        .level-btn {
            flex: 1;
            min-width: 120px;
            padding: 1.1rem 1.2rem;
            border-radius: 14px;
            background: rgba(13, 17, 23, 0.75);
            backdrop-filter: blur(6px);
            border: 2px solid transparent;
            color: var(--color-text);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .level-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.25s;
        }
        .level-btn:hover { transform: translateY(-2px); }

        /* B1 blue */
        .level-btn[data-level="b1"] { border-color: rgba(68, 147, 248, 0.3); }
        .level-btn[data-level="b1"]::before { background: linear-gradient(135deg, rgba(68, 147, 248, 0.12), transparent); }
        .level-btn[data-level="b1"]:hover { border-color: rgba(68, 147, 248, 0.6); }
        .level-btn[data-level="b1"].active {
            border-color: #4493f8;
            background: linear-gradient(135deg, rgba(68, 147, 248, 0.25), rgba(68, 147, 248, 0.08));
            box-shadow: 0 4px 24px rgba(68, 147, 248, 0.3), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .level-btn[data-level="b1"].active::before { opacity: 1; }

        /* B2 purple */
        .level-btn[data-level="b2"] { border-color: rgba(163, 113, 247, 0.3); }
        .level-btn[data-level="b2"]::before { background: linear-gradient(135deg, rgba(163, 113, 247, 0.12), transparent); }
        .level-btn[data-level="b2"]:hover { border-color: rgba(163, 113, 247, 0.6); }
        .level-btn[data-level="b2"].active {
            border-color: #a371f7;
            background: linear-gradient(135deg, rgba(163, 113, 247, 0.25), rgba(163, 113, 247, 0.08));
            box-shadow: 0 4px 24px rgba(163, 113, 247, 0.3), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .level-btn[data-level="b2"].active::before { opacity: 1; }

        /* C1 gold */
        .level-btn[data-level="c1"] { border-color: rgba(210, 153, 34, 0.3); }
        .level-btn[data-level="c1"]::before { background: linear-gradient(135deg, rgba(210, 153, 34, 0.12), transparent); }
        .level-btn[data-level="c1"]:hover { border-color: rgba(210, 153, 34, 0.6); }
        .level-btn[data-level="c1"].active {
            border-color: #d29922;
            background: linear-gradient(135deg, rgba(210, 153, 34, 0.25), rgba(210, 153, 34, 0.08));
            box-shadow: 0 4px 24px rgba(210, 153, 34, 0.3), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .level-btn[data-level="c1"].active::before { opacity: 1; }

        .level-btn .level-badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .level-btn[data-level="b1"] .level-badge { background: rgba(68, 147, 248, 0.2); color: #79b8ff; }
        .level-btn[data-level="b2"] .level-badge { background: rgba(163, 113, 247, 0.2); color: #c8a5ff; }
        .level-btn[data-level="c1"] .level-badge { background: rgba(210, 153, 34, 0.2); color: #e3b341; }
        .level-btn.active .level-badge { background: rgba(255,255,255,0.15); color: #fff; }

        .level-btn small {
            display: block;
            font-weight: 400;
            font-size: 0.78rem;
            opacity: 0.65;
            margin-top: 0.35rem;
        }

        /* ===== TOPIC PILLS ===== */
        .topic-pills {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 0 0 1.5rem;
        }
        .topic-pill {
            padding: 0.55rem 1.2rem;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--color-text-secondary);
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .topic-pill:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--color-text);
        }
        .topic-pill.active {
            background: rgba(68, 147, 248, 0.12);
            border-color: rgba(68, 147, 248, 0.4);
            color: #fff;
        }
        /* Purple active for B2 */
        body.level-b2 .topic-pill.active {
            background: rgba(163, 113, 247, 0.12);
            border-color: rgba(163, 113, 247, 0.4);
        }
        /* Gold active for C1 */
        body.level-c1 .topic-pill.active {
            background: rgba(210, 153, 34, 0.12);
            border-color: rgba(210, 153, 34, 0.4);
        }

        /* ===== WORD COUNT ===== */
        .vocab-count-bar {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--color-text-muted);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .vocab-count-bar .count-num {
            font-weight: 700;
            font-size: 1rem;
        }

        /* ===== VOCAB CARD GRID ===== */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.7rem;
        }

        /* ===== VOCAB CARD ===== */
        .vocab-card {
            position: relative;
            min-height: 130px;
            border-radius: 14px;
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: all 0.25s ease;
            overflow: hidden;
            perspective: 600px;
        }
        .vocab-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        /* Colored left border by level */
        .vocab-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            border-radius: 14px 0 0 14px;
        }
        body.level-b1 .vocab-card::before { background: #4493f8; }
        body.level-b2 .vocab-card::before { background: #a371f7; }
        body.level-c1 .vocab-card::before { background: #d29922; }

        /* Flip icon */
        .vocab-card .flip-icon {
            position: absolute;
            top: 0.6rem;
            right: 0.7rem;
            font-size: 0.8rem;
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        .vocab-card:hover .flip-icon { opacity: 0.6; }
        .vocab-card.flipped .flip-icon { opacity: 0; }

        /* FRONT */
        .vocab-card .card-front {
            padding: 1.2rem 1.2rem 1rem 1.4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 130px;
        }
        .vocab-card .card-front .word-main {
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
        }

        /* BACK */
        .vocab-card .card-back {
            display: none;
            padding: 1.1rem 1.1rem 0.9rem 1.3rem;
            min-height: 160px;
        }
        .vocab-card.flipped .card-front { display: none; }
        .vocab-card.flipped .card-back { display: flex; flex-direction: column; justify-content: center; }

        .vocab-card .card-back .translation {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.3;
        }
        body.level-b1 .vocab-card .card-back .translation { color: #79b8ff; }
        body.level-b2 .vocab-card .card-back .translation { color: #c8a5ff; }
        body.level-c1 .vocab-card .card-back .translation { color: #e3b341; }

        .vocab-card .card-back .explanation {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.65);
            line-height: 1.5;
            margin-top: 0.4rem;
        }
        .vocab-card .card-back .example {
            font-size: 0.78rem;
            font-style: italic;
            color: var(--color-text-muted);
            margin-top: 0.5rem;
            line-height: 1.45;
        }
        .vocab-card .card-back .back-level {
            display: inline-block;
            margin-top: 0.6rem;
            padding: 0.1rem 0.5rem;
            border-radius: 10px;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            width: fit-content;
        }
        body.level-b1 .back-level { background: rgba(68, 147, 248, 0.15); color: #79b8ff; }
        body.level-b2 .back-level { background: rgba(163, 113, 247, 0.15); color: #c8a5ff; }
        body.level-c1 .back-level { background: rgba(210, 153, 34, 0.15); color: #e3b341; }

        /* Subtle top border glow on hover */
        .vocab-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 4px;
            right: 0;
            height: 1px;
            opacity: 0;
            transition: opacity 0.25s;
        }
        body.level-b1 .vocab-card::after { background: linear-gradient(90deg, rgba(68,147,248,0.5), transparent); }
        body.level-b2 .vocab-card::after { background: linear-gradient(90deg, rgba(163,113,247,0.5), transparent); }
        body.level-c1 .vocab-card::after { background: linear-gradient(90deg, rgba(210,153,34,0.5), transparent); }
        .vocab-card:hover::after { opacity: 1; }

        /* ===== SECTION LABEL ===== */
        .section-label {
            color: var(--color-text-muted);
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.6rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .level-btn { padding: 0.8rem 0.6rem; font-size: 0.95rem; }
            .vocab-grid { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
            .vocab-card .card-front { padding: 1rem 0.8rem 0.8rem 1rem; min-height: 100px; }
            .vocab-card .card-back { padding: 1rem 0.8rem 0.8rem 1rem; min-height: 100px; }
            .vocab-card .card-front .word-main { font-size: 1rem; }
        }
        @media (max-width: 380px) {
            .vocab-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <script>
        // ===== Vocabulary Data =====
        // Format: [deutsches Wort, русский перевод, Beispielsatz]
        // Format: [word, translation, explanation, example]
        const VOCAB = {
            // ===== GEF&Uuml;HLE =====
            'b1:gefuehle': [
                ['sich sch&auml;men', 'стыдиться', 'Когда тебе неловко за то, что ты сделал, и хочется провалиться сквозь землю', 'Er sch&auml;mt sich f&uuml;r seinen Fehler vor der ganzen Klasse.'],
                ['die Entt&auml;uschung', 'разочарование', 'Ты ждал чего-то хорошего, а вышло плохо &mdash; и теперь грустно и обидно', 'Die Entt&auml;uschung &uuml;ber das Ergebnis war ihm deutlich anzusehen.'],
                ['erleichtert sein', 'с облегчением', 'Когда наконец-то закончилось что-то тяжёлое &mdash; вздохнул и думаешь &laquo;ну слава богу&raquo;', 'Nach der Pr&uuml;fung war sie sichtlich erleichtert.'],
                ['beunruhigt sein', 'обеспокоенный', 'Тебя что-то тревожит, не можешь перестать думать о плохом', 'Die Eltern waren beunruhigt, weil ihr Kind nicht nach Hause kam.'],
                ['&uuml;berw&auml;ltigt sein', 'потрясённый', 'Чувств так много, что ты не можешь их обработать &mdash; от радости или от шока', 'Sie war &uuml;berw&auml;ltigt von der Unterst&uuml;tzung ihrer Freunde.'],
                ['sich freuen &uuml;ber', 'радоваться', 'Просто радость &mdash; тебе подарили что-то, получил хорошую новость', 'Ich freue mich &uuml;ber die gute Note in Deutsch.'],
                ['w&uuml;tend', 'злой, в ярости', 'Сильная злость &mdash; не просто раздражён, а реально кипишь', 'Er wurde w&uuml;tend, als er die Wahrheit erfuhr.'],
                ['einsam', 'одинокий', 'Когда вокруг вроде люди, но ты чувствуешь себя один', 'In der neuen Stadt f&uuml;hlte er sich einsam.'],
                ['stolz sein auf', 'гордиться', 'Когда кто-то добился чего-то и тебе за него приятно', 'Die Mutter ist stolz auf den Abschluss ihrer Tochter.'],
                ['sich Sorgen machen', 'беспокоиться', 'Думать о ком-то или о чём-то плохом, что может случиться', 'Die Eltern machen sich Sorgen um die Zukunft ihrer Kinder.'],
                ['traurig', 'грустный', 'Не злой, не обиженный, а просто тихо грустно', 'Nach dem Abschied von ihrer Freundin war sie sehr traurig.'],
                ['aufgeregt', 'взволнованный', 'Перед чем-то важным &mdash; сердце стучит, руки дрожат, не можешь усидеть', 'Vor der Pr&auml;sentation war sie total aufgeregt.']
            ],
            'b2:gefuehle': [
                ['die Betroffenheit', 'потрясение', 'Когда узнаёшь что-то плохое и тебя это реально задевает &mdash; не равнодушен', 'Die Betroffenheit der Zuh&ouml;rer war nach dem Bericht sp&uuml;rbar.'],
                ['das Mitgef&uuml;hl', 'сочувствие', 'Ты чувствуешь чужую боль как свою, хочешь помочь', 'Er zeigte gro&szlig;es Mitgef&uuml;hl f&uuml;r die betroffenen Familien.'],
                ['verunsichert sein', 'растерянный', 'Раньше был уверен, а теперь не знаешь &mdash; может я ошибался?', 'Durch die st&auml;ndige Kritik war er v&ouml;llig verunsichert.'],
                ['die Zerrissenheit', 'раздвоенность', 'Когда тебя тянет в две стороны и ты не можешь выбрать &mdash; &laquo;и хочется и колется&raquo;', 'Die Figur zeigt eine innere Zerrissenheit zwischen Pflicht und Freiheit.'],
                ['beklommen sein', 'тревожно на душе', 'Тяжёлое чувство в груди, когда что-то плохое вот-вот случится', 'Mit beklemmenem Gef&uuml;hl betrat er das leere Haus.'],
                ['sich &uuml;berfordert f&uuml;hlen', 'перегруженный', 'Задач больше, чем ты можешь потянуть &mdash; хочется всё бросить', 'Viele Sch&uuml;ler f&uuml;hlen sich vor den Pr&uuml;fungen &uuml;berfordert.'],
                ['die Gleichg&uuml;ltigkeit', 'равнодушие', 'Когда тебе просто всё равно &mdash; не радостно и не грустно, никак', 'Ihre Gleichg&uuml;ltigkeit gegen&uuml;ber dem Problem verletzte ihn.'],
                ['gekr&auml;nkt', 'обиженный', 'Тебе сказали что-то неприятное и это задело за живое', 'Sie war durch seine Worte tief gekr&auml;nkt.'],
                ['die Sehnsucht', 'тоска, томление', 'Скучаешь по чему-то далёкому &mdash; по дому, по человеку, по прошлому', 'Der Protagonist versp&uuml;rt Sehnsucht nach seiner Heimat.'],
                ['das Selbstvertrauen', 'уверенность в себе', 'Ты веришь, что справишься &mdash; не боишься пробовать новое', 'Die Erfahrung st&auml;rkte sein Selbstvertrauen.'],
                ['hilflos', 'беспомощный', 'Хочешь что-то сделать, но не можешь &mdash; ситуация сильнее тебя', 'Gegen&uuml;ber dem Mobbing f&uuml;hlte er sich v&ouml;llig hilflos.'],
                ['die Verzweiflung', 'отчаяние', 'Когда кажется, что выхода вообще нет &mdash; самая сильная безнадёга', 'In ihrer Verzweiflung suchte sie Hilfe bei einer Beratungsstelle.']
            ],
            'c1:gefuehle': [
                ['die Ambivalenz', 'двойственность', 'Одновременно чувствуешь два противоположных чувства &mdash; и любишь и ненавидишь', 'Die Ambivalenz seiner Gef&uuml;hle gegen&uuml;ber der Entscheidung pr&auml;gt den Text.'],
                ['das Unbehagen', 'дискомфорт', 'Лёгкая тревога, что-то не так, но не можешь объяснить что именно', 'Ein wachsendes Unbehagen ergriff sie w&auml;hrend des Gespr&auml;chs.'],
                ['die Ern&uuml;chterung', 'отрезвление', 'Сначала был в восторге, а потом понял &mdash; всё не так круто как казалось', 'Nach anf&auml;nglicher Begeisterung folgte schnell die Ern&uuml;chterung.'],
                ['resigniert', 'смирившийся', 'Устал бороться и просто принял: ладно, пусть будет как будет', 'Resigniert nahm er das Ergebnis hin, ohne zu protestieren.'],
                ['die Ohnmacht', 'бессилие', 'Ты видишь проблему, но совершенно не можешь ничего изменить', 'Angesichts der Situation empfand er tiefe Ohnmacht.'],
                ['die Wehmut', 'меланхолия', 'Лёгкая грусть, когда вспоминаешь что-то хорошее, чего уже нет', 'Mit Wehmut erinnert sich die Erz&auml;hlerin an ihre Kindheit.'],
                ['der innere Konflikt', 'внутренний конфликт', 'Герой борется сам с собой &mdash; голова говорит одно, сердце другое', 'Der Protagonist k&auml;mpft mit einem inneren Konflikt zwischen Pflicht und Wunsch.'],
                ['sich entfremden', 'отчуждаться', 'Постепенно становиться чужими &mdash; раньше были близки, а теперь нет', 'Im Laufe der Geschichte entfremden sich die beiden Figuren voneinander.'],
                ['die Best&uuml;rzung', 'потрясение', 'Сильный шок от плохой новости &mdash; не веришь своим ушам', 'Die Nachricht l&ouml;ste in der Gemeinde tiefe Best&uuml;rzung aus.'],
                ['die Verbitterung', 'озлобленность', 'Долго копил обиду, и она превратилась в постоянную злость на мир', 'Seine Verbitterung &uuml;ber das Unrecht zeigt sich in jeder &Auml;u&szlig;erung.'],
                ['zwiesp&auml;ltig', 'противоречивый', 'Не однозначный &mdash; с одной стороны хорошо, с другой плохо', 'Der Leser gewinnt einen zwiesp&auml;ltigen Eindruck von der Hauptfigur.'],
                ['die Entr&uuml;stung', 'возмущение', 'Когда что-то настолько несправедливо, что ты кипишь от злости', 'Der Vorschlag stie&szlig; in der &Ouml;ffentlichkeit auf allgemeine Entr&uuml;stung.']
            ],

                ['zugrunde liegen', 'лежать в основе', 'Быть настоящей причиной &mdash; то, что на самом деле стоит за проблемой', 'Dem Konflikt liegen tiefere soziale Ursachen zugrunde.'],
                ['die Schlussfolgerung', 'вывод', 'Итог, к которому приходишь после анализа &mdash; &laquo;из всего этого следует, что...&raquo;', 'Aus den Daten l&auml;sst sich folgende Schlussfolgerung ziehen.'],
                ['die Polarisierung', 'поляризация', 'Общество раскалывается на два лагеря &mdash; &laquo;за&raquo; и &laquo;против&raquo;, без середины', 'Die politische Polarisierung der Gesellschaft nimmt deutlich zu.'],
                ['der gesellschaftliche Wandel', 'общественные перемены', 'Когда общество меняется &mdash; новые ценности, технологии, образ жизни', 'Der gesellschaftliche Wandel vollzieht sich immer schneller.'],
                ['verdeutlichen', 'наглядно показывать', 'Сделать что-то понятным &mdash; автор поясняет свою мысль примером', 'Der Autor verdeutlicht seine zentrale These anhand konkreter Beispiele.'],
                ['die Partizipation', 'участие', 'Когда люди реально участвуют в жизни общества &mdash; голосуют, действуют', 'Politische Partizipation ist eine Grundlage der Demokratie.'],
                ['der Diskurs', 'дискурс', 'Публичное обсуждение важной темы &mdash; в СМИ, в политике', 'Der &ouml;ffentliche Diskurs &uuml;ber Migration wird zunehmend emotional gef&uuml;hrt.'],
                ['die Koh&auml;sion', 'сплочённость', 'Внутренняя связь общества &mdash; ощущение &laquo;мы вместе&raquo;', 'Die soziale Koh&auml;sion in vielen Gesellschaften schwindet.'],
                ['der Wertekonflikt', 'конфликт ценностей', 'Когда у разных групп разные ценности и они сталкиваются', 'Der Wertekonflikt zwischen den Generationen pr&auml;gt die aktuelle Debatte.']
            ]
        };

        const TOPIC_META = {
            gefuehle: { icon: '\u{1F496}', title: 'Gef\u00fchle' },
            schule: { icon: '\u{1F393}', title: 'Schule' },
            umwelt: { icon: '\u{1F33F}', title: 'Umwelt' },
            gesellschaft: { icon: '\u{1F465}', title: 'Gesellschaft' }
        };

        let currentLevel = 'b1';
        let currentTopic = 'gefuehle';

        function renderVocab() {
            const key = currentLevel + ':' + currentTopic;
            const data = VOCAB[key] || [];
            const grid = document.getElementById('vocab-grid');
            const meta = TOPIC_META[currentTopic];
            const lvl = currentLevel.toUpperCase();

            // Update body class for color theming
            document.body.classList.remove('level-b1', 'level-b2', 'level-c1');
            document.body.classList.add('level-' + currentLevel);

            document.getElementById('vocab-icon').innerHTML = meta.icon;
            document.getElementById('vocab-title').textContent = meta.title + ' \u2014 ' + lvl;
            document.getElementById('vocab-count').innerHTML = '<span class="count-num">' + data.length + '</span> W\u00f6rter';

            grid.innerHTML = data.map(function(item) {
                return '<div class="vocab-card">' +
                    '<span class="flip-icon">\u{1F504}</span>' +
                    '<div class="card-front">' +
                        '<div class="word-main">' + item[0] + '</div>' +
                    '</div>' +
                    '<div class="card-back">' +
                        '<div class="translation">' + item[1] + '</div>' +
                        '<div class="explanation">' + item[2] + '</div>' +
                        '<div class="example">\u00ab' + item[3] + '\u00bb</div>' +
                        '<span class="back-level">' + lvl + '</span>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        // Level buttons
        document.querySelectorAll('.level-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.level-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentLevel = btn.dataset.level;
                renderVocab();
            });
        });

        // Topic pills
        document.querySelectorAll('.topic-pill').forEach(function(pill) {
            pill.addEventListener('click', function() {
                document.querySelectorAll('.topic-pill').forEach(function(p) { p.classList.remove('active'); });
                pill.classList.add('active');
                currentTopic = pill.dataset.topic;
                renderVocab();
            });
        });

        // Flashcard flip (delegated)
        document.addEventListener('click', function(e) {
            var card = e.target.closest('.vocab-card');
            if (card) card.classList.toggle('flipped');
        });

        // Initial render
        renderVocab();
    </script>
</body>
</html>
