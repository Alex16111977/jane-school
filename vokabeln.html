<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabeln | NeoStudy</title>
    <link rel="stylesheet" href="css/style.css?v=10">
    <link rel="stylesheet" href="css/englisch.css?v=10">
    <style>
        html { background: #0a0a14; }

        /* ===== LEVEL SELECTOR ===== */
        .level-tabs {
            display: flex;
            gap: 0.8rem;
            margin: 1rem 0 1.5rem;
            flex-wrap: wrap;
        }
        .level-btn {
            flex: 1;
            min-width: 120px;
            padding: 1.1rem 1.2rem;
            border-radius: 14px;
            background: rgba(13, 17, 23, 0.75);
            backdrop-filter: blur(6px);
            border: 2px solid transparent;
            color: var(--color-text);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .level-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.25s;
        }
        .level-btn:hover { transform: translateY(-2px); }

        /* B1 blue */
        .level-btn[data-level="b1"] { border-color: rgba(68, 147, 248, 0.3); }
        .level-btn[data-level="b1"]::before { background: linear-gradient(135deg, rgba(68, 147, 248, 0.12), transparent); }
        .level-btn[data-level="b1"]:hover { border-color: rgba(68, 147, 248, 0.6); }
        .level-btn[data-level="b1"].active {
            border-color: #4493f8;
            background: linear-gradient(135deg, rgba(68, 147, 248, 0.25), rgba(68, 147, 248, 0.08));
            box-shadow: 0 4px 24px rgba(68, 147, 248, 0.3), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .level-btn[data-level="b1"].active::before { opacity: 1; }

        /* B2 purple */
        .level-btn[data-level="b2"] { border-color: rgba(163, 113, 247, 0.3); }
        .level-btn[data-level="b2"]::before { background: linear-gradient(135deg, rgba(163, 113, 247, 0.12), transparent); }
        .level-btn[data-level="b2"]:hover { border-color: rgba(163, 113, 247, 0.6); }
        .level-btn[data-level="b2"].active {
            border-color: #a371f7;
            background: linear-gradient(135deg, rgba(163, 113, 247, 0.25), rgba(163, 113, 247, 0.08));
            box-shadow: 0 4px 24px rgba(163, 113, 247, 0.3), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .level-btn[data-level="b2"].active::before { opacity: 1; }

        /* C1 gold */
        .level-btn[data-level="c1"] { border-color: rgba(210, 153, 34, 0.3); }
        .level-btn[data-level="c1"]::before { background: linear-gradient(135deg, rgba(210, 153, 34, 0.12), transparent); }
        .level-btn[data-level="c1"]:hover { border-color: rgba(210, 153, 34, 0.6); }
        .level-btn[data-level="c1"].active {
            border-color: #d29922;
            background: linear-gradient(135deg, rgba(210, 153, 34, 0.25), rgba(210, 153, 34, 0.08));
            box-shadow: 0 4px 24px rgba(210, 153, 34, 0.3), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .level-btn[data-level="c1"].active::before { opacity: 1; }

        .level-btn .level-badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .level-btn[data-level="b1"] .level-badge { background: rgba(68, 147, 248, 0.2); color: #79b8ff; }
        .level-btn[data-level="b2"] .level-badge { background: rgba(163, 113, 247, 0.2); color: #c8a5ff; }
        .level-btn[data-level="c1"] .level-badge { background: rgba(210, 153, 34, 0.2); color: #e3b341; }
        .level-btn.active .level-badge { background: rgba(255,255,255,0.15); color: #fff; }

        .level-btn small {
            display: block;
            font-weight: 400;
            font-size: 0.78rem;
            opacity: 0.65;
            margin-top: 0.35rem;
        }

        /* ===== TOPIC PILLS ===== */
        .topic-pills {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 0 0 1.5rem;
        }
        .topic-pill {
            padding: 0.55rem 1.2rem;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--color-text-secondary);
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .topic-pill:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--color-text);
        }
        .topic-pill.active {
            background: rgba(68, 147, 248, 0.12);
            border-color: rgba(68, 147, 248, 0.4);
            color: #fff;
        }
        /* Purple active for B2 */
        body.level-b2 .topic-pill.active {
            background: rgba(163, 113, 247, 0.12);
            border-color: rgba(163, 113, 247, 0.4);
        }
        /* Gold active for C1 */
        body.level-c1 .topic-pill.active {
            background: rgba(210, 153, 34, 0.12);
            border-color: rgba(210, 153, 34, 0.4);
        }

        /* ===== WORD COUNT ===== */
        .vocab-count-bar {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--color-text-muted);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .vocab-count-bar .count-num {
            font-weight: 700;
            font-size: 1rem;
        }

        /* ===== VOCAB CARD GRID ===== */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.7rem;
        }

        /* ===== VOCAB CARD ===== */
        .vocab-card {
            position: relative;
            min-height: 130px;
            border-radius: 14px;
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: all 0.25s ease;
            overflow: hidden;
            perspective: 600px;
        }
        .vocab-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        /* Colored left border by level */
        .vocab-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            border-radius: 14px 0 0 14px;
        }
        body.level-b1 .vocab-card::before { background: #4493f8; }
        body.level-b2 .vocab-card::before { background: #a371f7; }
        body.level-c1 .vocab-card::before { background: #d29922; }

        /* Flip icon */
        .vocab-card .flip-icon {
            position: absolute;
            top: 0.6rem;
            right: 0.7rem;
            font-size: 0.8rem;
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        .vocab-card:hover .flip-icon { opacity: 0.6; }
        .vocab-card.flipped .flip-icon { opacity: 0; }

        /* FRONT */
        .vocab-card .card-front {
            padding: 1.2rem 1.2rem 1rem 1.4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 130px;
        }
        .vocab-card .card-front .word-main {
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
        }

        /* BACK */
        .vocab-card .card-back {
            display: none;
            padding: 1.1rem 1.1rem 0.9rem 1.3rem;
            min-height: 160px;
        }
        .vocab-card.flipped .card-front { display: none; }
        .vocab-card.flipped .card-back { display: flex; flex-direction: column; justify-content: center; }

        .vocab-card .card-back .translation {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.3;
        }
        body.level-b1 .vocab-card .card-back .translation { color: #79b8ff; }
        body.level-b2 .vocab-card .card-back .translation { color: #c8a5ff; }
        body.level-c1 .vocab-card .card-back .translation { color: #e3b341; }

        .vocab-card .card-back .explanation {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.65);
            line-height: 1.5;
            margin-top: 0.4rem;
        }
        .vocab-card .card-back .example {
            font-size: 0.78rem;
            font-style: italic;
            color: var(--color-text-muted);
            margin-top: 0.5rem;
            line-height: 1.45;
        }
        .vocab-card .card-back .back-level {
            display: inline-block;
            margin-top: 0.6rem;
            padding: 0.1rem 0.5rem;
            border-radius: 10px;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            width: fit-content;
        }
        body.level-b1 .back-level { background: rgba(68, 147, 248, 0.15); color: #79b8ff; }
        body.level-b2 .back-level { background: rgba(163, 113, 247, 0.15); color: #c8a5ff; }
        body.level-c1 .back-level { background: rgba(210, 153, 34, 0.15); color: #e3b341; }

        /* Subtle top border glow on hover */
        .vocab-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 4px;
            right: 0;
            height: 1px;
            opacity: 0;
            transition: opacity 0.25s;
        }
        body.level-b1 .vocab-card::after { background: linear-gradient(90deg, rgba(68,147,248,0.5), transparent); }
        body.level-b2 .vocab-card::after { background: linear-gradient(90deg, rgba(163,113,247,0.5), transparent); }
        body.level-c1 .vocab-card::after { background: linear-gradient(90deg, rgba(210,153,34,0.5), transparent); }
        .vocab-card:hover::after { opacity: 1; }

        /* ===== SECTION LABEL ===== */
        .section-label {
            color: var(--color-text-muted);
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.6rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .level-btn { padding: 0.8rem 0.6rem; font-size: 0.95rem; }
            .vocab-grid { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
            .vocab-card .card-front { padding: 1rem 0.8rem 0.8rem 1rem; min-height: 100px; }
            .vocab-card .card-back { padding: 1rem 0.8rem 0.8rem 1rem; min-height: 100px; }
            .vocab-card .card-front .word-main { font-size: 1rem; }
        }
        @media (max-width: 380px) {
            .vocab-grid { grid-template-columns: 1fr; }
        }

        /* ===== MODE SWITCHER ===== */
        .mode-tabs {
            display: flex;
            gap: 0.4rem;
            margin: 1rem 0 1.2rem;
            flex-wrap: wrap;
        }
        .mode-btn {
            padding: 0.5rem 0.9rem;
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--color-text-muted);
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .mode-btn.active {
            background: rgba(68,147,248,0.15);
            border-color: rgba(68,147,248,0.4);
            color: #fff;
        }
        body.level-b2 .mode-btn.active { background: rgba(163,113,247,0.15); border-color: rgba(163,113,247,0.4); }
        body.level-c1 .mode-btn.active { background: rgba(210,153,34,0.15); border-color: rgba(210,153,34,0.4); }

        /* ===== PROGRESS BAR ===== */
        .progress-strip {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1rem;
            font-size: 0.82rem;
            color: var(--color-text-muted);
        }
        .progress-track {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        body.level-b1 .progress-fill { background: #4493f8; }
        body.level-b2 .progress-fill { background: #a371f7; }
        body.level-c1 .progress-fill { background: #d29922; }

        /* ===== KNOW/DONT KNOW BUTTONS ===== */
        .card-actions {
            display: none;
            gap: 0.5rem;
            margin-top: 0.6rem;
        }
        .vocab-card.flipped .card-actions { display: flex; }
        .card-action-btn {
            flex: 1;
            padding: 0.45rem;
            border-radius: 8px;
            border: none;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .card-action-btn.know {
            background: rgba(63,185,80,0.15);
            color: #3fb950;
            border: 1px solid rgba(63,185,80,0.3);
        }
        .card-action-btn.know:hover { background: rgba(63,185,80,0.25); }
        .card-action-btn.again {
            background: rgba(248,81,73,0.12);
            color: #f85149;
            border: 1px solid rgba(248,81,73,0.3);
        }
        .card-action-btn.again:hover { background: rgba(248,81,73,0.22); }

        /* ===== QUIZ MODE ===== */
        .quiz-area { max-width: 600px; }
        .quiz-card {
            background: rgba(13,17,23,0.8);
            border-radius: 14px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .quiz-word {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.3rem;
        }
        .quiz-hint {
            font-size: 0.82rem;
            color: var(--color-text-muted);
            margin-bottom: 1.2rem;
        }
        .quiz-opts { display: flex; flex-direction: column; gap: 0.5rem; }
        .quiz-opt {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--color-text);
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.15s;
            text-align: left;
        }
        .quiz-opt:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        .quiz-opt.correct { background: rgba(63,185,80,0.2); border-color: #3fb950; color: #3fb950; }
        .quiz-opt.wrong { background: rgba(248,81,73,0.15); border-color: #f85149; color: #f85149; }
        .quiz-opt.disabled { pointer-events: none; opacity: 0.6; }
        .quiz-progress { font-size: 0.8rem; color: var(--color-text-muted); margin-bottom: 0.5rem; }
        .quiz-result {
            text-align: center;
            padding: 2rem;
        }
        .quiz-result .score-big {
            font-size: 3rem;
            font-weight: 800;
            margin: 0.5rem 0;
        }
        .quiz-result .score-label { color: var(--color-text-muted); font-size: 0.95rem; }
        .quiz-result .retry-btn {
            margin-top: 1.5rem;
            padding: 0.7rem 2rem;
            border-radius: 10px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }
        body.level-b1 .score-big { color: #4493f8; }
        body.level-b2 .score-big { color: #a371f7; }
        body.level-c1 .score-big { color: #d29922; }
        body.level-b1 .retry-btn { background: rgba(68,147,248,0.2); color: #79b8ff; }
        body.level-b2 .retry-btn { background: rgba(163,113,247,0.2); color: #c8a5ff; }
        body.level-c1 .retry-btn { background: rgba(210,153,34,0.2); color: #e3b341; }

        /* ===== MATCH MODE ===== */
        .match-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
        }
        .match-col { display: flex; flex-direction: column; gap: 0.5rem; }
        .match-item {
            padding: 0.8rem 1rem;
            border-radius: 10px;
            background: rgba(13,17,23,0.8);
            border: 2px solid rgba(255,255,255,0.08);
            color: var(--color-text);
            font-size: 0.92rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .match-item:hover { border-color: rgba(255,255,255,0.25); }
        .match-item.selected { border-color: #4493f8; background: rgba(68,147,248,0.1); }
        body.level-b2 .match-item.selected { border-color: #a371f7; background: rgba(163,113,247,0.1); }
        body.level-c1 .match-item.selected { border-color: #d29922; background: rgba(210,153,34,0.1); }
        .match-item.correct {
            background: rgba(63,185,80,0.15);
            border-color: rgba(63,185,80,0.4);
            color: #3fb950;
            pointer-events: none;
            opacity: 0.6;
        }
        .match-item.wrong { animation: matchShake 0.4s; border-color: #f85149; }
        @keyframes matchShake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .match-score { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--color-text-muted); }

        /* ===== TYPE MODE ===== */
        .type-area { max-width: 600px; }
        .type-card {
            background: rgba(13,17,23,0.8);
            border-radius: 14px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .type-word {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.3rem;
        }
        .type-explain {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.55);
            margin-bottom: 1rem;
        }
        .type-row { display: flex; gap: 0.5rem; }
        .type-input {
            flex: 1;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }
        .type-input:focus { border-color: rgba(68,147,248,0.5); }
        .type-check {
            padding: 0.7rem 1.2rem;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
        }
        body.level-b1 .type-check { background: rgba(68,147,248,0.2); color: #79b8ff; }
        body.level-b2 .type-check { background: rgba(163,113,247,0.2); color: #c8a5ff; }
        body.level-c1 .type-check { background: rgba(210,153,34,0.2); color: #e3b341; }
        .type-feedback { margin-top: 0.6rem; font-size: 0.88rem; min-height: 1.3em; }
        .type-feedback.ok { color: #3fb950; }
        .type-feedback.fail { color: #f85149; }
        .type-nav { display: flex; justify-content: center; margin-top: 0.5rem; }
        .type-next {
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: transparent;
            color: var(--color-text-muted);
            cursor: pointer;
            font-size: 0.85rem;
        }

        /* ===== SPEED MODE ===== */
        .speed-timer-bar {
            text-align: center;
            margin-bottom: 1rem;
        }
        .speed-time {
            font-size: 2.5rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }
        body.level-b1 .speed-time { color: #4493f8; }
        body.level-b2 .speed-time { color: #a371f7; }
        body.level-c1 .speed-time { color: #d29922; }
        .speed-time.danger { color: #f85149 !important; animation: speedPulse 0.5s infinite; }
        @keyframes speedPulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        .speed-score-live {
            font-size: 0.9rem;
            color: var(--color-text-muted);
            margin-top: 0.2rem;
        }
        .speed-start-btn {
            display: block;
            margin: 2rem auto;
            padding: 1rem 3rem;
            border-radius: 14px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }
        body.level-b1 .speed-start-btn { background: rgba(68,147,248,0.2); color: #79b8ff; }
        body.level-b2 .speed-start-btn { background: rgba(163,113,247,0.2); color: #c8a5ff; }
        body.level-c1 .speed-start-btn { background: rgba(210,153,34,0.2); color: #e3b341; }

        /* ===== SURVIVAL MODE ===== */
        .lives { font-size: 1.3rem; letter-spacing: 2px; margin-bottom: 0.3rem; }
        .lives-label { font-size: 0.8rem; color: var(--color-text-muted); }
        .survival-streak { font-size: 0.85rem; margin-top: 0.2rem; }
        body.level-b1 .survival-streak { color: #4493f8; }
        body.level-b2 .survival-streak { color: #a371f7; }
        body.level-c1 .survival-streak { color: #d29922; }

        /* ===== SENTENCE BUILD ===== */
        .sentence-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            justify-content: center;
            margin: 1rem 0;
        }
        .sentence-chip {
            padding: 0.5rem 0.9rem;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--color-text);
            font-size: 0.92rem;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }
        .sentence-chip:hover { background: rgba(255,255,255,0.12); }
        .sentence-chip.used { opacity: 0.3; pointer-events: none; }
        .sentence-result {
            min-height: 50px;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            border: 2px dashed rgba(255,255,255,0.12);
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;

            display: grid;

            gap: 0.6rem;
            margin-bottom: 1rem;
            max-width: 600px;

        .leitner-stat {
            padding: 0.85rem 0.6rem;

            margin-bottom: 0.5rem;

            color: var(--color-text-muted);

        /* ===== STORY/TEXT MODE ===== */

            var p = getProgress();

        }
        function getKnownCount(data) {
            var p = getProgress();
            var key = currentLevel + ':' + currentTopic;
            var count = 0;
            data.forEach(function(item, i) { if (p[key + ':' + i] && p[key + ':' + i].known) count++; });
            return count;

        function updateProgressBar(data) {
            var strip = document.getElementById('progress-strip');
            if (currentMode !== 'cards') { strip.style.display = 'none'; return; }
            strip.style.display = 'flex';

        // ===== LEITNER (SRS) =====
        const LEITNER_INTERVALS_MS = [
            0,
            4 * 3600 * 1000,
            24 * 3600 * 1000,
            3 * 24 * 3600 * 1000,
            7 * 24 * 3600 * 1000,
            21 * 24 * 3600 * 1000
        ];
        function getLeitnerData() {
            try { return JSON.parse(localStorage.getItem('neo_vocab_leitner') || '{}'); } catch(e) { return {}; }
        }
        function saveLeitnerData(d) { localStorage.setItem('neo_vocab_leitner', JSON.stringify(d)); }
        function leitnerKey(level, topic, item) {
            return level + '|' + topic + '|' + stripHtmlSafe(item[0]);
        }
        function stripHtmlSafe(s) { var d = document.createElement('div'); d.innerHTML = s; return d.textContent || ''; }
        function recordLeitner(level, topic, item, correct) {
            if (!item) return;
            var d = getLeitnerData();
            var k = leitnerKey(level, topic, item);
            var e = d[k] || { box: 1, due: 0 };
            if (correct) e.box = Math.min(5, (e.box || 1) + 1);
            else e.box = 1;
            e.due = Date.now() + LEITNER_INTERVALS_MS[e.box];
            e.seen = Date.now();
            d[k] = e;
            saveLeitnerData(d);
        }
        function getAllDueForLevel(level) {
            var d = getLeitnerData();
            var now = Date.now();
            var due = [];
            for (var k in d) {
                if (k.indexOf(level + '|') !== 0) continue;
                if ((d[k].due || 0) > now) continue;
                var parts = k.split('|');
                if (parts.length < 3) continue;
                var topic = parts[1];
                var word = parts.slice(2).join('|');
                var items = VOCAB[level + ':' + topic] || [];
                var found = null;
                for (var i = 0; i < items.length; i++) {
                    if (stripHtmlSafe(items[i][0]) === word) { found = items[i]; break; }
                }
                if (found) due.push({ topic: topic, item: found, box: d[k].box || 1 });
            }
            return due;
        }
        function getLeitnerStats(level) {
            var d = getLeitnerData();
            var now = Date.now();
            var stats = { total: 0, due: 0, learned: 0, byBox: [0,0,0,0,0,0] };
            for (var k in d) {
                if (k.indexOf(level + '|') !== 0) continue;
                stats.total++;
                var b = d[k].box || 1;
                stats.byBox[b]++;
                if ((d[k].due || 0) <= now) stats.due++;
                if (b >= 4) stats.learned++;
            }
            return stats;
        }

        function getEmojiFor(item) {
            var hay = (stripHtmlSafe(item[1]) + ' ' + stripHtmlSafe(item[2])).toLowerCase();
            var found = [];
            for (var i = 0; i < EMOJI_MAP.length; i++) {
                if (EMOJI_MAP[i][0].test(hay)) {
                    if (found.indexOf(EMOJI_MAP[i][1]) === -1) {
                        found.push(EMOJI_MAP[i][1]);
                        if (found.length >= 3) break;
                    }
                }
            }
            if (!found.length) found.push((TOPIC_META[currentTopic] && TOPIC_META[currentTopic].icon) || '\u2753');
            if (found.length < 2) found.push('\u{1F914}');
            return found.slice(0, 3).join(' ');
        }

        // ===== HELPERS =====
        function shuffle(arr) { var a = arr.slice(); for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; } return a; }
        function getData() { return VOCAB[currentLevel + ':' + currentTopic] || []; }
        function getRandomOptions(correct, allData, count) {
            var opts = [correct];
            var pool = allData.filter(function(item) { return item[1] !== correct; });
            pool = shuffle(pool);
            for (var i = 0; i < count - 1 && i < pool.length; i++) opts.push(pool[i][1]);
            while (opts.length < count) opts.push('---');
            return shuffle(opts);
        }
        function stripHtml(s) { var d = document.createElement('div'); d.innerHTML = s; return d.textContent || ''; }

        // ===== RENDER ROUTER =====
        function renderVocab() {
            if (speedTimer) { clearInterval(speedTimer); speedTimer = null; }
            var key = currentLevel + ':' + currentTopic;
            var data = getData();
            var grid = document.getElementById('vocab-grid');
            var meta = TOPIC_META[currentTopic];
            var lvl = currentLevel.toUpperCase();

            document.body.classList.remove('level-b1', 'level-b2', 'level-c1');
            document.body.classList.add('level-' + currentLevel);

            document.getElementById('vocab-icon').innerHTML = meta.icon;
            document.getElementById('vocab-title').textContent = meta.title + ' \u2014 ' + lvl;
            document.getElementById('vocab-count').innerHTML = '<span class="count-num">' + data.length + '</span> W\u00f6rter';

            // Remove grid class for non-card modes
            grid.className = (currentMode === 'cards') ? 'vocab-grid' : '';

            if (currentMode === 'cards') renderCards(grid, data, lvl, key);
            else if (currentMode === 'quiz') renderQuiz(grid, data, lvl);
            else if (currentMode === 'match') renderMatch(grid, data);
            else if (currentMode === 'type') renderType(grid, data, lvl);
            else if (currentMode === 'speed') renderSpeed(grid, data, lvl);
            else if (currentMode === 'describe') renderDescribe(grid, data, lvl);
            else if (currentMode === 'blank') renderBlank(grid, data, lvl);
            else if (currentMode === 'survival') renderSurvival(grid, data, lvl);
            else if (currentMode === 'reverse') renderReverse(grid, data, lvl);
            else if (currentMode === 'sentence') renderSentence(grid, data, lvl);
            else if (currentMode === 'leitner') renderLeitner(grid, lvl);
            else if (currentMode === 'story') renderStory(grid, data, lvl);
            else if (currentMode === 'bilder') renderBilder(grid, data, lvl);

            updateProgressBar(data);
        }

        // ===== MODE: CARDS =====
        function renderCards(grid, data, lvl, key) {
            var p = getProgress();
            // Sort: unknown first
            var indexed = data.map(function(item, i) { return { item: item, idx: i }; });
            indexed.sort(function(a, b) {
                var aK = p[key + ':' + a.idx] && p[key + ':' + a.idx].known ? 1 : 0;
                var bK = p[key + ':' + b.idx] && p[key + ':' + b.idx].known ? 1 : 0;
                return aK - bK;
            });
            grid.innerHTML = indexed.map(function(obj) {
                var item = obj.item;
                var isKnown = p[key + ':' + obj.idx] && p[key + ':' + obj.idx].known;
                return '<div class="vocab-card" data-idx="' + obj.idx + '">' +
                    '<span class="flip-icon">\u{1F504}</span>' +
                    '<div class="card-front">' +
                        '<div class="word-main">' + item[0] + '</div>' +
                        (isKnown ? '<div style="font-size:0.7rem;color:#3fb950;margin-top:0.3rem;">\u2713 gelernt</div>' : '') +
                    '</div>' +
                    '<div class="card-back">' +
                        '<div class="translation">' + item[1] + '</div>' +
                        '<div class="explanation">' + item[2] + '</div>' +
                        '<div class="example">\u00ab' + item[3] + '\u00bb</div>' +
                        '<span class="back-level">' + lvl + '</span>' +
                        '<div class="card-actions">' +
                            '<button class="card-action-btn know" onclick="event.stopPropagation();markWord(this,true)">\u2705 Kenne ich</button>' +
                            '<button class="card-action-btn again" onclick="event.stopPropagation();markWord(this,false)">\u{1F504} Nochmal</button>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }
        function markWord(btn, known) {
            var card = btn.closest('.vocab-card');
            var idx = card.dataset.idx;
            var key = currentLevel + ':' + currentTopic + ':' + idx;
            saveWord(key, known);
            // Visual feedback
            card.style.transition = 'opacity 0.3s, transform 0.3s';
            card.style.opacity = '0.4';
            card.style.transform = 'scale(0.95)';
            setTimeout(function() { renderVocab(); }, 400);
        }

        // ===== MODE: QUIZ =====
        function renderQuiz(grid, data, lvl) {
            var questions = shuffle(data.slice());
            var qIdx = 0;
            var score = 0;
            var total = questions.length;

            function showQuestion() {
                if (qIdx >= total) {
                    var pct = Math.round(score / total * 100);
                    var emoji = pct >= 80 ? '\u2B50' : pct >= 50 ? '\u{1F44D}' : '\u{1F4AA}';
                    grid.innerHTML = '<div class="quiz-area"><div class="quiz-card quiz-result">' +
                        '<div class="score-label">' + emoji + ' Ergebnis</div>' +
                        '<div class="score-big">' + score + '/' + total + '</div>' +
                        '<div class="score-label">' + pct + '% richtig</div>' +
                        '<button class="retry-btn" onclick="renderVocab()">Nochmal \u{1F504}</button>' +
                    '</div></div>';
                    return;
                }
                var q = questions[qIdx];
                var opts = getRandomOptions(q[1], data, 4);
                grid.innerHTML = '<div class="quiz-area">' +
                    '<div class="quiz-progress">Frage ' + (qIdx + 1) + ' / ' + total + ' \u00b7 Richtig: ' + score + '</div>' +
                    '<div class="quiz-card">' +
                        '<div class="quiz-word">' + q[0] + '</div>' +
                        '<div class="quiz-hint">' + q[2] + '</div>' +
                        '<div class="quiz-opts">' + opts.map(function(o) {
                            return '<button class="quiz-opt" data-answer="' + o.replace(/"/g, '&quot;') + '">' + o + '</button>';
                        }).join('') + '</div>' +
                    '</div></div>';
            }

        // ===== MODE: MATCH =====
        function renderMatch(grid, data) {
            var pairs = shuffle(data.slice()).slice(0, 6);
            var leftItems = shuffle(pairs.map(function(p, i) { return { text: p[0], idx: i, side: 'left' }; }));
            var rightItems = shuffle(pairs.map(function(p, i) { return { text: p[1], idx: i, side: 'right' }; }));
            var matched = 0;
            var selected = null;

            function render() {
                grid.innerHTML = '<div class="match-grid">' +
                    '<div class="match-col">' + leftItems.map(function(it) {
                        return '<div class="match-item' + (it.done ? ' correct' : '') + '" data-side="left" data-idx="' + it.idx + '">' + it.text + '</div>';
                    }).join('') + '</div>' +
                    '<div class="match-col">' + rightItems.map(function(it) {
                        return '<div class="match-item' + (it.done ? ' correct' : '') + '" data-side="right" data-idx="' + it.idx + '">' + it.text + '</div>';
                    }).join('') + '</div>' +
                '</div>' +
                '<div class="match-score">' + matched + ' / ' + pairs.length + ' Paare</div>';
            }
            render();

            grid.onclick = function(e) {
                var item = e.target.closest('.match-item');
                if (!item || item.classList.contains('correct')) return;

                if (!selected) {
                    selected = { side: item.dataset.side, idx: parseInt(item.dataset.idx), el: item };
                    item.classList.add('selected');
                } else {
                    if (selected.side === item.dataset.side) {
                        selected.el.classList.remove('selected');
                        selected = { side: item.dataset.side, idx: parseInt(item.dataset.idx), el: item };
                        item.classList.add('selected');
                        return;
                    }
                    var idx1 = selected.idx;
                    var idx2 = parseInt(item.dataset.idx);
                    if (idx1 === idx2) {
                        // Correct match
                        matched++;
                        leftItems.forEach(function(it) { if (it.idx === idx1) it.done = true; });
                        rightItems.forEach(function(it) { if (it.idx === idx1) it.done = true; });
                        selected = null;
                        render();
                        if (matched === pairs.length) {
                            grid.innerHTML += '<div style="text-align:center;margin-top:1.5rem;">' +
                                '<div style="font-size:2rem;">\u{1F389}</div>' +
                                '<div style="color:#3fb950;font-weight:600;margin:0.5rem 0;">Alle Paare gefunden!</div>' +
                                '<button class="retry-btn" onclick="renderVocab()">Nochmal \u{1F504}</button></div>';
                        }
                    } else {
                        // Wrong
                        item.classList.add('wrong');
                        selected.el.classList.add('wrong');
                        var oldSel = selected;
                        selected = null;
                        setTimeout(function() {
                            item.classList.remove('wrong', 'selected');
                            oldSel.el.classList.remove('wrong', 'selected');
                        }, 500);
                    }
                }
            };
        }

        // ===== MODE: BLANK (Fill the gap) =====
        function renderBlank(grid, data, lvl) {
            var items = shuffle(data.filter(function(d) { return d[3] && d[3].length > 10; })).slice(0, 12);
            if (!items.length) items = shuffle(data.slice()).slice(0, 12);
            var idx = 0, score = 0, total = items.length;

            function showQ() {
                if (idx >= total) {
                    var pct = Math.round(score / total * 100);
                    grid.innerHTML = '<div class="quiz-area"><div class="quiz-card quiz-result">' +
                        '<div class="score-label">\u{1F4AC} Ergebnis</div>' +

                        '<div class="score-label">' + pct + '% richtig</div>' +
                        '<button class="retry-btn" onclick="renderVocab()">Nochmal \u{1F504}</button></div></div>';
                    return;
                }
                var q = items[idx];
                var word = stripHtml(q[0]);
                var sentence = stripHtml(q[3]);
                // Find the word or part of it in the sentence
                var parts = word.split(/\s+/);
                var mainWord = parts[parts.length - 1]; // last word (e.g. from "sich schämen" take "schämen")
                var blanked = sentence;
                var found = false;
                // Try to find the main word in the sentence (case-insensitive)
                var regex = new RegExp('(' + mainWord.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '[a-z\u00e4\u00f6\u00fc\u00df]*)', 'i');
                if (regex.test(sentence)) {
                    blanked = sentence.replace(regex, '<span class="blank-gap">______</span>');
                    found = true;
                }
                if (!found) blanked = sentence.replace(/([\w\u00e4\u00f6\u00fc\u00df]{4,})/i, '<span class="blank-gap">______</span>');

                // Options: correct + 3 wrong
                var opts = [word];
                var pool = shuffle(data.filter(function(d) { return d[0] !== q[0]; }));
                for (var i = 0; i < 3 && i < pool.length; i++) opts.push(stripHtml(pool[i][0]));
                opts = shuffle(opts);

                grid.innerHTML = '<div class="quiz-area">' +
                    '<div class="quiz-progress">Frage ' + (idx + 1) + ' / ' + total + ' \u00b7 Richtig: ' + score + '</div>' +
                    '<div class="quiz-card">' +
                        '<div style="font-size:0.78rem;color:var(--color-text-muted);margin-bottom:0.5rem;">\u{1F4AC} F\u00fclle die L\u00fccke:</div>' +

                        '<div class="quiz-opts">' + opts.map(function(o) {
                            return '<button class="quiz-opt" data-answer="' + o.replace(/"/g,'&quot;') + '">' + o + '</button>';
                        }).join('') + '</div>' +
                    '</div></div>';
            }
            showQ();

            grid.onclick = function(e) {
                var opt = e.target.closest('.quiz-opt');
                if (!opt || opt.classList.contains('disabled')) return;
                var correct = stripHtml(items[idx][0]);
                grid.querySelectorAll('.quiz-opt').forEach(function(o) { o.classList.add('disabled'); });
                var isOk = opt.dataset.answer === correct;
                if (isOk) { opt.classList.add('correct'); score++; }
                else {
                    opt.classList.add('wrong');
                    grid.querySelectorAll('.quiz-opt').forEach(function(o) { if (o.dataset.answer === correct) o.classList.add('correct'); });
                }
                recordLeitner(currentLevel, currentTopic, items[idx], isOk);
                idx++;
                setTimeout(showQ, 900);

                        '<div class="sentence-result" id="sent-result">' +
                            placed.map(function(w, i) { return '<span class="sentence-placed" data-pi="' + i + '">' + w + '</span>'; }).join('') +
                            (placed.length === 0 ? '<span style="color:var(--color-text-muted);font-size:0.82rem;">Klicke W\u00f6rter in der richtigen Reihenfolge</span>' : '') +
                        '</div>' +
                        '<div class="sentence-bank" id="sent-bank">' +
                            shuffled.map(function(w, i) {
                                var isUsed = false;
                                var usedCount = placed.filter(function(p) { return p === w; }).length;
                                var totalCount = shuffled.slice(0, i + 1).filter(function(s) { return s === w; }).length;
                                if (usedCount >= totalCount) isUsed = true;
                                return '<span class="sentence-chip' + (isUsed ? ' used' : '') + '" data-wi="' + i + '">' + w + '</span>';
                            }).join('') +
                        '</div>' +
                        '<div id="sent-fb" class="type-feedback" style="text-align:center;"></div>' +
                    '</div></div>';
            }

            showQ();
            var shuffledRef = [];

            grid.onclick = function(e) {
                // Click on chip to add to result
                var chip = e.target.closest('.sentence-chip');
                if (chip && !chip.classList.contains('used')) {
                    placed.push(chip.textContent);
                    var q = items[idx];
                    var sentence = stripHtml(q[3]);
                    var currentWords = sentence.split(/\s+/);
                    // Get shuffled order from current DOM
                    var allChips = Array.from(grid.querySelectorAll('.sentence-chip'));
                    var shuffled = allChips.map(function(c) { return c.textContent; });
                    renderSentenceUI(shuffled, q);

                    // Auto-check when all words placed
                    if (placed.length === currentWords.length) {
                        var fb = document.getElementById('sent-fb');
                        if (placed.join(' ') === currentWords.join(' ')) {
                            fb.textContent = '\u2705 Richtig!';
                            fb.className = 'type-feedback ok';
                            score++;
                        } else {
                            fb.innerHTML = '\u274C Richtig: <em>' + sentence + '</em>';
                            fb.className = 'type-feedback fail';
                        }
                        idx++;
                        setTimeout(showQ, 1500);
                    }
                }
                // Click on placed word to remove it
                var placedEl = e.target.closest('.sentence-placed');
                if (placedEl) {
                    var pi = parseInt(placedEl.dataset.pi);
                    placed.splice(pi, 1);
                    var q = items[idx];
                    var allChips = Array.from(grid.querySelectorAll('.sentence-chip'));
                    var shuffled = allChips.map(function(c) { return c.textContent; });
                    renderSentenceUI(shuffled, q);
                }
            };
        }

        // ===== MODE: LEITNER (SRS) =====
        function renderLeitner(grid, lvl) {
            var stats = getLeitnerStats(currentLevel);
            var due = getAllDueForLevel(currentLevel);

            var header = '<div class="leitner-stats">' +
                '<div class="leitner-stat due"><div class="leitner-stat-num">' + stats.due + '</div><div class="leitner-stat-label">\u0414\u043e \u043f\u043e\u0432\u0442\u043e\u0440\u0435\u043d\u043d\u044f</div></div>' +
                '<div class="leitner-stat learned"><div class="leitner-stat-num">' + stats.learned + '</div><div class="leitner-stat-label">\u0412\u0438\u0432\u0447\u0435\u043d\u043e</div></div>' +
                '<div class="leitner-stat total"><div class="leitner-stat-num">' + stats.total + '</div><div class="leitner-stat-label">\u0412 \u0441\u0442\u0430\u043f\u0435\u043b\u0456</div></div>' +
            '</div>' +
            '<div class="leitner-box-row">' +
                [1,2,3,4,5].map(function(b) {
                    return '<span class="leitner-box-pill' + (stats.byBox[b] ? ' has' : '') + '">\u{1F4E6} ' + b + '<strong>' + stats.byBox[b] + '</strong></span>';
                }).join('') +
            '</div>';

            if (!stats.total) {
                grid.innerHTML = header +
                    '<div class="quiz-area"><div class="quiz-card" style="text-align:center;padding:2.5rem 1.5rem;">' +
                        '<div style="font-size:2.8rem;margin-bottom:0.8rem;">\u{1F3B4}</div>' +
                        '<div style="color:#fff;font-weight:700;font-size:1.1rem;margin-bottom:0.6rem;">Mein Stapel ist noch leer</div>' +
                        '<div style="color:var(--color-text-muted);font-size:0.88rem;line-height:1.55;">\u041f\u0440\u043e\u0439\u0434\u0438 Quiz, Eingabe, R\u00fcckw\u00e4rts \u0430\u0431\u043e Beschreibung &mdash;<br>\u0441\u043b\u043e\u0432\u0430 \u0430\u0432\u0442\u043e\u043c\u0430\u0442\u0438\u0447\u043d\u043e \u043f\u043e\u0442\u0440\u0430\u043f\u043b\u044f\u0442\u044c \u0443 Leitner-\u043a\u043e\u0440\u043e\u0431\u043a\u0438.</div>' +
                    '</div></div>';
                return;
            }
            if (!due.length) {
                grid.innerHTML = header +
                    '<div class="quiz-area"><div class="quiz-card" style="text-align:center;padding:2rem 1.5rem;">' +
                        '<div style="font-size:2.8rem;margin-bottom:0.6rem;">\u{1F389}</div>' +
                        '<div style="color:#3fb950;font-weight:700;font-size:1.1rem;margin-bottom:0.5rem;">Alles wiederholt!</div>' +
                        '<div style="color:var(--color-text-muted);font-size:0.85rem;line-height:1.5;">\u041f\u0440\u0438\u0445\u043e\u0434\u044c \u043f\u0456\u0437\u043d\u0456\u0448\u0435 &mdash; \u0441\u043b\u043e\u0432\u0430 \u0447\u0435\u043a\u0430\u044e\u0442\u044c \u0441\u0432\u043e\u0454\u0457 \u0447\u0435\u0440\u0433\u0438.</div>' +
                    '</div></div>';
                return;
            }

            var shuffled = shuffle(due);
            var qIdx = 0, score = 0, total = shuffled.length;

            function showQ() {
                if (qIdx >= total) {
                    var newStats = getLeitnerStats(currentLevel);
                    grid.innerHTML =
                        '<div class="leitner-stats">' +
                            '<div class="leitner-stat due"><div class="leitner-stat-num">' + newStats.due + '</div><div class="leitner-stat-label">\u0414\u043e \u043f\u043e\u0432\u0442\u043e\u0440\u0435\u043d\u043d\u044f</div></div>' +
                            '<div class="leitner-stat learned"><div class="leitner-stat-num">' + newStats.learned + '</div><div class="leitner-stat-label">\u0412\u0438\u0432\u0447\u0435\u043d\u043e</div></div>' +
                            '<div class="leitner-stat total"><div class="leitner-stat-num">' + newStats.total + '</div><div class="leitner-stat-label">\u0412 \u0441\u0442\u0430\u043f\u0435\u043b\u0456</div></div>' +
                        '</div>' +
                        '<div class="quiz-area"><div class="quiz-card quiz-result">' +
                            '<div class="score-label">\u{1F3B4} Runde fertig</div>' +
                            '<div class="score-big">' + score + '/' + total + '</div>' +
                            '<div class="score-label">Leitner aktualisiert</div>' +
                            '<button class="retry-btn" onclick="renderVocab()">Weiter \u{1F504}</button>' +
                        '</div></div>';
                    return;
                }
                var cur = shuffled[qIdx];
                var topicMeta = TOPIC_META[cur.topic] || { title: cur.topic, icon: '' };
                var pool = VOCAB[currentLevel + ':' + cur.topic] || [];
                var opts = getRandomOptions(cur.item[1], pool, 4);
                var boxDots = '';
                for (var b = 1; b <= 5; b++) boxDots += '<span class="leitner-box-dot' + (b <= cur.box ? ' filled' : '') + '"></span>';

                grid.innerHTML = header +
                    '<div class="quiz-area">' +
                        '<div class="quiz-progress">Wort ' + (qIdx + 1) + ' / ' + total + ' \u00b7 Richtig: ' + score + '</div>' +
                        '<div class="quiz-card">' +
                            '<span class="leitner-topic-badge">' + topicMeta.icon + ' ' + topicMeta.title + '</span>' +
                            '<span class="leitner-box-indicator">' + boxDots + '</span>' +
                            '<div class="quiz-word">' + cur.item[0] + '</div>' +
                            '<div class="quiz-hint">' + cur.item[2] + '</div>' +
                            '<div class="quiz-opts">' + opts.map(function(o) {
                                return '<button class="quiz-opt" data-answer="' + o.replace(/"/g,'&quot;') + '">' + o + '</button>';
                            }).join('') + '</div>' +
                        '</div>' +
                    '</div>';
            }
            showQ();

            grid.onclick = function(e) {
                var opt = e.target.closest('.quiz-opt');
                if (!opt || opt.classList.contains('disabled')) return;
                var cur = shuffled[qIdx];
                var correct = cur.item[1];
                grid.querySelectorAll('.quiz-opt').forEach(function(o) { o.classList.add('disabled'); });
                var ok = stripHtml(opt.dataset.answer) === stripHtml(correct);
                if (ok) { opt.classList.add('correct'); score++; }
                else {
                    opt.classList.add('wrong');
                    grid.querySelectorAll('.quiz-opt').forEach(function(o) { if (stripHtml(o.dataset.answer) === stripHtml(correct)) o.classList.add('correct'); });
                }
                recordLeitner(currentLevel, cur.topic, cur.item, ok);
                qIdx++;
                setTimeout(showQ, 800);
            };
        }

        // ===== MODE: STORY (Mini-Text mit Tap-to-Translate) =====
        function renderStory(grid, data, lvl) {
            if (data.length < 4) {
                grid.innerHTML = '<div class="quiz-area"><div class="quiz-card" style="text-align:center;padding:2rem;"><div style="color:var(--color-text-muted);">\u0414\u043b\u044f \u0446\u0456\u0454\u0457 \u0442\u0435\u043c\u0438 \u043c\u0430\u043b\u043e \u0441\u043b\u0456\u0432 \u0434\u043b\u044f \u0442\u0435\u043a\u0441\u0442\u0443.</div></div></div>';
                return;
            }
            var count = Math.min(7, data.length);
            var picks = shuffle(data.slice()).slice(0, count);
            var sentences = picks.map(function(p, i) {
                var sent = stripHtml(p[3] || '');
                if (!sent) return '';
                var word = stripHtml(p[0]);
                var parts = word.split(/\s+/);
                var mainWord = parts[parts.length - 1];
                var regex = new RegExp('(' + mainWord.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '[a-z\u00e4\u00f6\u00fc\u00df]{0,})', 'i');
                var wrapped = sent;
                if (regex.test(sent)) {
                    wrapped = sent.replace(regex, '<span class="story-word" data-pi="' + i + '">$1</span>');
                } else {
                    wrapped = '<span class="story-word" data-pi="' + i + '">' + word + '</span>: ' + sent;
                }
                return '<div class="story-sentence">' + wrapped + '</div>';
            }).join('');

            var qCount = Math.min(3, picks.length);
            var qs = shuffle(picks.slice()).slice(0, qCount);
            var qHtml = qs.map(function(q, qi) {
                var opts = [stripHtml(q[0])];
                var pool = shuffle(picks.filter(function(p) { return stripHtml(p[0]) !== stripHtml(q[0]); }));
                for (var i = 0; i < 3 && i < pool.length; i++) opts.push(stripHtml(pool[i][0]));
                // Add extras from full data if not enough picks
                if (opts.length < 4) {
                    var extra = shuffle(data.filter(function(d) { return opts.indexOf(stripHtml(d[0])) === -1; }));
                    for (var j = 0; j < extra.length && opts.length < 4; j++) opts.push(stripHtml(extra[j][0]));
                }
                opts = shuffle(opts);
                return '<div class="quiz-card" style="margin-bottom:0.8rem;">' +
                    '<div style="font-size:0.78rem;color:var(--color-text-muted);margin-bottom:0.4rem;">\u2753 Welches Wort bedeutet:</div>' +
                    '<div style="font-weight:600;font-size:1rem;color:#fff;margin-bottom:0.9rem;">\u00ab' + q[1] + '\u00bb</div>' +
                    '<div class="quiz-opts" data-qi="' + qi + '" data-correct="' + stripHtml(q[0]).replace(/"/g,'&quot;') + '">' +
                        opts.map(function(o) { return '<button class="quiz-opt" data-answer="' + o.replace(/"/g,'&quot;') + '">' + o + '</button>'; }).join('') +
                    '</div>' +
                '</div>';
            }).join('');

            grid.innerHTML = '<div class="quiz-area">' +
                '<div class="story-card">' +
                    '<div class="story-title">\u{1F4D6} Mini-Text &mdash; ' + (TOPIC_META[currentTopic] ? TOPIC_META[currentTopic].title : currentTopic) + '</div>' +
                    sentences +
                    '<div style="font-size:0.75rem;color:var(--color-text-muted);margin-top:0.8rem;">\u{1F4A1} \u0422\u0430\u043f\u043d\u0438 \u043d\u0430 \u0432\u0438\u0434\u0456\u043b\u0435\u043d\u0435 \u0441\u043b\u043e\u0432\u043e, \u0449\u043e\u0431 \u043f\u043e\u0431\u0430\u0447\u0438\u0442\u0438 \u043f\u0435\u0440\u0435\u043a\u043b\u0430\u0434</div>' +
                '</div>' +
                qHtml +
            '</div>';

            grid.onclick = function(e) {
                var sw = e.target.closest('.story-word');
                if (sw) {
                    var pi = parseInt(sw.dataset.pi);
                    var item = picks[pi];
                    var oldPop = document.querySelector('.story-pop');
                    if (oldPop) oldPop.remove();
                    if (sw.classList.contains('revealed')) {
                        sw.classList.remove('revealed');
                        return;
                    }
                    sw.classList.add('revealed');
                    var pop = document.createElement('div');
                    pop.className = 'story-pop';
                    pop.innerHTML = '<strong>' + item[1] + '</strong><span>' + item[2] + '</span>';
                    document.body.appendChild(pop);
                    var rect = sw.getBoundingClientRect();
                    pop.style.top = (rect.bottom + window.scrollY + 6) + 'px';
                    pop.style.left = Math.max(10, Math.min(window.innerWidth - 300, rect.left + window.scrollX)) + 'px';
                    setTimeout(function() { if (pop.parentNode) pop.remove(); }, 4000);
                    return;
                }
                var opt = e.target.closest('.quiz-opt');
                if (!opt) return;
                var optsWrap = opt.parentElement;
                if (optsWrap.classList.contains('done')) return;
                optsWrap.classList.add('done');
                var correct = optsWrap.dataset.correct;
                optsWrap.querySelectorAll('.quiz-opt').forEach(function(o) { o.classList.add('disabled'); });
                var qi = parseInt(optsWrap.dataset.qi);
                var q = qs[qi];
                var ok = stripHtml(opt.dataset.answer) === stripHtml(correct);
                if (ok) opt.classList.add('correct');
                else {
                    opt.classList.add('wrong');
                    optsWrap.querySelectorAll('.quiz-opt').forEach(function(o) { if (stripHtml(o.dataset.answer) === stripHtml(correct)) o.classList.add('correct'); });
                }
                recordLeitner(currentLevel, currentTopic, q, ok);
            };
        }

        // ===== MODE: BILDER (Emoji-Assoziation) =====
        function renderBilder(grid, data, lvl) {
            var items = shuffle(data.slice());
            var total = Math.min(items.length, 12);
            items = items.slice(0, total);
            var idx = 0, score = 0;

            function showQ() {
                if (idx >= total) {
                    var pct = Math.round(score / total * 100);
                    grid.innerHTML = '<div class="quiz-area"><div class="quiz-card quiz-result">' +
                        '<div class="score-label">\u{1F3A8} Ergebnis</div>' +
                        '<div class="score-big">' + score + '/' + total + '</div>' +
                        '<div class="score-label">' + pct + '% richtig</div>' +
                        '<button class="retry-btn" onclick="renderVocab()">Nochmal \u{1F504}</button></div></div>';
                    return;
                }
                var q = items[idx];
                var emojiStr = getEmojiFor(q);
                var opts = [stripHtml(q[0])];
                var pool = shuffle(data.filter(function(d) { return stripHtml(d[0]) !== stripHtml(q[0]); }));
                for (var i = 0; i < 3 && i < pool.length; i++) opts.push(stripHtml(pool[i][0]));
                opts = shuffle(opts);

                grid.innerHTML = '<div class="quiz-area">' +
                    '<div class="quiz-progress">Frage ' + (idx + 1) + ' / ' + total + ' \u00b7 Richtig: ' + score + '</div>' +
                    '<div class="bilder-emoji-box">' +
                        '<div class="bilder-emoji">' + emojiStr + '</div>' +
                        '<div class="bilder-hint">\u{1F3A8} Welches Wort passt zum Bild?</div>' +
                    '</div>' +
                    '<div class="quiz-card">' +
                        '<div class="quiz-opts">' + opts.map(function(o) {
                            return '<button class="quiz-opt" data-answer="' + o.replace(/"/g,'&quot;') + '">' + o + '</button>';
                        }).join('') + '</div>' +
                    '</div></div>';
            }
            showQ();

            grid.onclick = function(e) {
                var opt = e.target.closest('.quiz-opt');
                if (!opt || opt.classList.contains('disabled')) return;
                var correct = stripHtml(items[idx][0]);
                var ok = stripHtml(opt.dataset.answer) === correct;
                grid.querySelectorAll('.quiz-opt').forEach(function(o) { o.classList.add('disabled'); });
                if (ok) { opt.classList.add('correct'); score++; }
                else {
                    opt.classList.add('wrong');
                    grid.querySelectorAll('.quiz-opt').forEach(function(o) { if (stripHtml(o.dataset.answer) === correct) o.classList.add('correct'); });
                }
                recordLeitner(currentLevel, currentTopic, items[idx], ok);
                idx++;
                setTimeout(showQ, 900);
            };
        }

        // ===== EVENT LISTENERS =====

        // Level buttons
        document.querySelectorAll('.level-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.level-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentLevel = btn.dataset.level;
                renderVocab();
            });
        });

        // Topic pills
        document.querySelectorAll('.topic-pill').forEach(function(pill) {
            pill.addEventListener('click', function() {
                document.querySelectorAll('.topic-pill').forEach(function(p) { p.classList.remove('active'); });
                pill.classList.add('active');
                currentTopic = pill.dataset.topic;
                renderVocab();
            });
        });

        // Mode buttons
        document.querySelectorAll('.mode-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                renderVocab();
            });
        });

        // Flashcard flip (delegated, only in cards mode)
        document.addEventListener('click', function(e) {
            if (currentMode !== 'cards') return;
            var card = e.target.closest('.vocab-card');
            if (card && !e.target.closest('.card-action-btn')) card.classList.toggle('flipped');
        });

        // Initial render
        renderVocab();
    </script>
</body>
</html>
