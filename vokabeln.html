        // ===== MODE: STORY (Mini-Text mit Tap-to-Translate) =====
        function renderStory(grid, data, lvl) {
            if (data.length < 4) {
                grid.innerHTML = '<div class="quiz-area"><div class="quiz-card" style="text-align:center;padding:2rem;"><div style="color:var(--color-text-muted);">\u0414\u043b\u044f \u0446\u0456\u0454\u0457 \u0442\u0435\u043c\u0438 \u043c\u0430\u043b\u043e \u0441\u043b\u0456\u0432 \u0434\u043b\u044f \u0442\u0435\u043a\u0441\u0442\u0443.</div></div></div>';
                return;
            }
            var count = Math.min(7, data.length);
            var picks = shuffle(data.slice()).slice(0, count);
            var sentences = picks.map(function(p, i) {
                var sent = stripHtml(p[3] || '');
                if (!sent) return '';
                var word = stripHtml(p[0]);
                var parts = word.split(/\s+/);
                var mainWord = parts[parts.length - 1];
                var regex = new RegExp('(' + mainWord.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '[a-z\u00e4\u00f6\u00fc\u00df]{0,})', 'i');
                var wrapped = sent;
                if (regex.test(sent)) {
                    wrapped = sent.replace(regex, '<span class="story-word" data-pi="' + i + '">$1</span>');
                } else {
                    wrapped = '<span class="story-word" data-pi="' + i + '">' + word + '</span>: ' + sent;
                }
                return '<div class="story-sentence">' + wrapped + '</div>';
            }).join('');

            var qCount = Math.min(3, picks.length);
            var qs = shuffle(picks.slice()).slice(0, qCount);
            var qHtml = qs.map(function(q, qi) {
                var opts = [stripHtml(q[0])];
                var pool = shuffle(picks.filter(function(p) { return stripHtml(p[0]) !== stripHtml(q[0]); }));
                for (var i = 0; i < 3 && i < pool.length; i++) opts.push(stripHtml(pool[i][0]));
                // Add extras from full data if not enough picks
                if (opts.length < 4) {
                    var extra = shuffle(data.filter(function(d) { return opts.indexOf(stripHtml(d[0])) === -1; }));
                    for (var j = 0; j < extra.length && opts.length < 4; j++) opts.push(stripHtml(extra[j][0]));
                }
                opts = shuffle(opts);
                return '<div class="quiz-card" style="margin-bottom:0.8rem;">' +
                    '<div style="font-size:0.78rem;color:var(--color-text-muted);margin-bottom:0.4rem;">\u2753 Welches Wort bedeutet:</div>' +
                    '<div style="font-weight:600;font-size:1rem;color:#fff;margin-bottom:0.9rem;">\u00ab' + q[1] + '\u00bb</div>' +
                    '<div class="quiz-opts" data-qi="' + qi + '" data-correct="' + stripHtml(q[0]).replace(/"/g,'&quot;') + '">' +
                        opts.map(function(o) { return '<button class="quiz-opt" data-answer="' + o.replace(/"/g,'&quot;') + '">' + o + '</button>'; }).join('') +
                    '</div>' +
                '</div>';
            }).join('');

            grid.innerHTML = '<div class="quiz-area">' +
                '<div class="story-card">' +
                    '<div class="story-title">\u{1F4D6} Mini-Text &mdash; ' + (TOPIC_META[currentTopic] ? TOPIC_META[currentTopic].title : currentTopic) + '</div>' +
                    sentences +
                    '<div style="font-size:0.75rem;color:var(--color-text-muted);margin-top:0.8rem;">\u{1F4A1} \u0422\u0430\u043f\u043d\u0438 \u043d\u0430 \u0432\u0438\u0434\u0456\u043b\u0435\u043d\u0435 \u0441\u043b\u043e\u0432\u043e, \u0449\u043e\u0431 \u043f\u043e\u0431\u0430\u0447\u0438\u0442\u0438 \u043f\u0435\u0440\u0435\u043a\u043b\u0430\u0434</div>' +
                '</div>' +
                qHtml +
            '</div>';

            grid.onclick = function(e) {
                var sw = e.target.closest('.story-word');
                if (sw) {
                    var pi = parseInt(sw.dataset.pi);
                    var item = picks[pi];
                    var oldPop = document.querySelector('.story-pop');
                    if (oldPop) oldPop.remove();
                    if (sw.classList.contains('revealed')) {
                        sw.classList.remove('revealed');
                        return;
                    }
                    sw.classList.add('revealed');
                    var pop = document.createElement('div');
                    pop.className = 'story-pop';
                    pop.innerHTML = '<strong>' + item[1] + '</strong><span>' + item[2] + '</span>';
                    document.body.appendChild(pop);
                    var rect = sw.getBoundingClientRect();
                    pop.style.top = (rect.bottom + window.scrollY + 6) + 'px';
                    pop.style.left = Math.max(10, Math.min(window.innerWidth - 300, rect.left + window.scrollX)) + 'px';
                    setTimeout(function() { if (pop.parentNode) pop.remove(); }, 4000);
                    return;
                }
                var opt = e.target.closest('.quiz-opt');
                if (!opt) return;
                var optsWrap = opt.parentElement;
                if (optsWrap.classList.contains('done')) return;
                optsWrap.classList.add('done');
                var correct = optsWrap.dataset.correct;
                optsWrap.querySelectorAll('.quiz-opt').forEach(function(o) { o.classList.add('disabled'); });
                var qi = parseInt(optsWrap.dataset.qi);
                var q = qs[qi];
                var ok = stripHtml(opt.dataset.answer) === stripHtml(correct);
                if (ok) opt.classList.add('correct');
                else {
                    opt.classList.add('wrong');
                    optsWrap.querySelectorAll('.quiz-opt').forEach(function(o) { if (stripHtml(o.dataset.answer) === stripHtml(correct)) o.classList.add('correct'); });
                }
                recordLeitner(currentLevel, currentTopic, q, ok);
            };
        }

                grid.innerHTML = '<div class="quiz-area">' +
                    '<div class="quiz-progress">Frage ' + (idx + 1) + ' / ' + total + ' \u00b7 Richtig: ' + score + '</div>' +
                    '<div class="bilder-emoji-box">' +
                        '<div class="bilder-emoji">' + emojiStr + '</div>' +
                        '<div class="bilder-hint">\u{1F3A8} Welches Wort passt zum Bild?</div>' +
                    '</div>' +
                    '<div class="quiz-card">' +
                        '<div class="quiz-opts">' + opts.map(function(o) {
                            return '<button class="quiz-opt" data-answer="' + o.replace(/"/g,'&quot;') + '">' + o + '</button>';
                        }).join('') + '</div>' +
                    '</div></div>';
            }
            showQ();

            grid.onclick = function(e) {
                var opt = e.target.closest('.quiz-opt');
                if (!opt || opt.classList.contains('disabled')) return;
                var correct = stripHtml(items[idx][0]);
                var ok = stripHtml(opt.dataset.answer) === correct;
                grid.querySelectorAll('.quiz-opt').forEach(function(o) { o.classList.add('disabled'); });
                if (ok) { opt.classList.add('correct'); score++; }
                else {
                    opt.classList.add('wrong');
                    grid.querySelectorAll('.quiz-opt').forEach(function(o) { if (stripHtml(o.dataset.answer) === correct) o.classList.add('correct'); });
                }
                recordLeitner(currentLevel, currentTopic, items[idx], ok);
                idx++;
                setTimeout(showQ, 900);
            };
        }

        // ===== EVENT LISTENERS =====

        function switchTopicPills(level) {
            var reg = document.getElementById('regular-topics');
            var syn = document.getElementById('syn-topics');
            var koll = document.getElementById('koll-topics');
            [reg, syn, koll].forEach(function(el) { el.style.display = 'none'; });
            var active = level === 'syn' ? syn : level === 'koll' ? koll : reg;
            active.style.display = '';
            active.querySelectorAll('.topic-pill').forEach(function(p) { p.classList.remove('active'); });
            var first = active.querySelector('.topic-pill');
            if (first) { first.classList.add('active'); currentTopic = first.dataset.topic; }
        }

        // Level buttons
        document.querySelectorAll('.level-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.level-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentLevel = btn.dataset.level;
                switchTopicPills(currentLevel);
                renderVocab();
            });
        });

        // Topic pills
        document.querySelectorAll('.topic-pill').forEach(function(pill) {
            pill.addEventListener('click', function() {
                var container = pill.closest('#regular-topics') || pill.closest('#syn-topics') || pill.closest('#koll-topics');
                container.querySelectorAll('.topic-pill').forEach(function(p) { p.classList.remove('active'); });
                pill.classList.add('active');
                currentTopic = pill.dataset.topic;
                renderVocab();
            });
        });

        // Mode buttons
        document.querySelectorAll('.mode-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                renderVocab();
            });
        });

        // Flashcard flip (delegated, only in cards mode)
        document.addEventListener('click', function(e) {
            if (currentMode !== 'cards') return;
            var card = e.target.closest('.vocab-card');
            if (card && !e.target.closest('.card-action-btn')) card.classList.toggle('flipped');
        });

        // Initial render
        renderVocab();
    </script>
</body>
</html>
