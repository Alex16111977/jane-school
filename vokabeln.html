            const key = currentLevel + ':' + currentTopic;
            const data = VOCAB[key] || [];
            const grid = document.getElementById('vocab-grid');
            const meta = TOPIC_META[currentTopic];

            document.getElementById('vocab-icon').innerHTML = meta.icon;
            document.getElementById('vocab-title').textContent = meta.title + ' \u2014 ' + currentLevel.toUpperCase();
            document.getElementById('vocab-subtitle').textContent = meta.sub + ' \u2014 ' + LEVEL_SUB[currentLevel];
            document.getElementById('vocab-count').textContent = data.length + ' W\u00f6rter';

            grid.innerHTML = data.map(function(item) {
                return '<div class="flashcard">' +
                    '<div class="flashcard-front">' + item[0] + '</div>' +
                    '<div class="flashcard-back">' +
                        '<strong>' + item[1] + '</strong>' +
                        '<p style="margin-top:0.4rem; font-style:italic;">&laquo;' + item[2] + '&raquo;</p>' +
                    '</div>' +
                    '<div class="flashcard-hint">klicken zum Umdrehen</div>' +
                '</div>';
            }).join('');
        }

        // Level buttons
        document.querySelectorAll('.level-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.level-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentLevel = btn.dataset.level;
                renderVocab();
            });
        });

        // Topic tabs

            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
                tab.classList.add('active');
                currentTopic = tab.dataset.topic;
                renderVocab();
            });
        });

        // Flashcard flip (delegated)
        document.addEventListener('click', function(e) {
            const card = e.target.closest('.flashcard');
            if (card) card.classList.toggle('flipped');
        });

        // Initial render
        renderVocab();
