    <style>
        html { background: #0a0a14; }

        /* ===== HERO ===== */
        .meme-hero {
            text-align: center;
            padding: 1.5rem 0 0.5rem;
        }
        .meme-hero h1 {
            font-size: clamp(1.6rem, 5vw, 2.8rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ff7b72, #d2a8ff, #58a6ff, #7ee787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
            margin-bottom: 0.4rem;
        }
        .meme-hero p {
            color: var(--color-text-muted);
            font-size: 0.95rem;
        }

        /* ===== CATEGORY PILLS ===== */
        .cat-pills {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 1.2rem 0 1rem;
        }
        .cat-pill {
            padding: 0.45rem 1rem;
            border-radius: 50px;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(255,255,255,0.1);
            color: var(--color-text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .cat-pill:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .cat-pill.active {
            background: rgba(255,123,114,0.12);
            border-color: rgba(255,123,114,0.5);
            color: #ff7b72;
        }
        .cat-pill[data-cat="trap"].active    { background: rgba(210,168,255,0.12); border-color: rgba(210,168,255,0.5); color: #d2a8ff; }
        .cat-pill[data-cat="gigaword"].active{ background: rgba(88,166,255,0.12);  border-color: rgba(88,166,255,0.5);  color: #58a6ff; }
        .cat-pill[data-cat="literal"].active { background: rgba(126,231,135,0.12); border-color: rgba(126,231,135,0.5); color: #7ee787; }
        .cat-pill[data-cat="slang"].active   { background: rgba(255,212,59,0.12);  border-color: rgba(255,212,59,0.5);  color: #f0c040; }
        .cat-pill[data-cat="all"].active     { background: rgba(255,123,114,0.12); border-color: rgba(255,123,114,0.5); color: #ff7b72; }

        /* ===== CARD GRID ===== */
        .meme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 0.8rem;
        }

        /* ===== MEME CARD ===== */
        .meme-card {
            position: relative;
            border-radius: 16px;
            background: rgba(13,17,23,0.85);
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(255,255,255,0.07);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            overflow: hidden;
            min-height: 150px;
        }
        .meme-card:hover {
            transform: translateY(-4px) rotate(-0.5deg);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.18);
        }

        /* category color stripe */
        .meme-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            border-radius: 16px 0 0 16px;
        }
        .meme-card[data-cat="funny"]::before   { background: linear-gradient(180deg,#ff7b72,#ffa070); }
        .meme-card[data-cat="trap"]::before    { background: linear-gradient(180deg,#d2a8ff,#a371f7); }
        .meme-card[data-cat="gigaword"]::before{ background: linear-gradient(180deg,#58a6ff,#388bfd); }
        .meme-card[data-cat="literal"]::before { background: linear-gradient(180deg,#7ee787,#56d364); }
        .meme-card[data-cat="slang"]::before   { background: linear-gradient(180deg,#f0c040,#e3a832); }

        /* FRONT */
        .card-front, .card-back {
            padding: 1.1rem 1.1rem 1rem 1.4rem;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .card-back { display: none; }
        .meme-card.flipped .card-front { display: none; }
        .meme-card.flipped .card-back  { display: flex; }

        .card-emoji {
            font-size: 2rem;
            margin-bottom: 0.35rem;
            line-height: 1;
        }
        .card-word {
            font-size: 1.15rem;
            font-weight: 800;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 0.25rem;
        }
        .card-hint {
            font-size: 0.78rem;
            color: var(--color-text-muted);
            font-style: italic;
        }
        .card-tap {
            position: absolute;
            bottom: 0.6rem;
            right: 0.8rem;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.2);
            transition: color 0.2s;
        }
        .meme-card:hover .card-tap { color: rgba(255,255,255,0.4); }
        .meme-card.flipped .card-tap { display: none; }

        /* BACK */
        .card-translation {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }
        .meme-card[data-cat="funny"]    .card-translation { color: #ff7b72; }
        .meme-card[data-cat="trap"]     .card-translation { color: #d2a8ff; }
        .meme-card[data-cat="gigaword"] .card-translation { color: #58a6ff; }
        .meme-card[data-cat="literal"]  .card-translation { color: #7ee787; }
        .meme-card[data-cat="slang"]    .card-translation { color: #f0c040; }

        .card-meme {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.55;
            margin-top: 0.3rem;
        }
        .card-meme .lol {
            display: block;
            margin-top: 0.3rem;
            font-size: 0.78rem;
            color: var(--color-text-muted);
            font-style: italic;
        }

        /* ===== CAT BADGE ===== */
        .cat-badge {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            padding: 0.1rem 0.5rem;
            border-radius: 20px;
            margin-bottom: 0.5rem;
            width: fit-content;
        }
        .badge-funny   { background: rgba(255,123,114,0.15); color: #ff7b72; }
        .badge-trap    { background: rgba(210,168,255,0.15); color: #d2a8ff; }
        .badge-giga    { background: rgba(88,166,255,0.15);  color: #58a6ff; }
        .badge-literal { background: rgba(126,231,135,0.15); color: #7ee787; }
        .badge-slang   { background: rgba(240,192,64,0.15);  color: #f0c040; }

        /* ===== COUNTER ===== */
        .meme-count {
            font-size: 0.82rem;
            color: var(--color-text-muted);
            margin-bottom: 0.8rem;
        }

        /* ===== SHUFFLE BTN ===== */
        .shuffle-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            border: 1.5px solid rgba(255,123,114,0.4);
            background: rgba(255,123,114,0.07);
            color: #ff7b72;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }
        .shuffle-btn:hover {
            background: rgba(255,123,114,0.15);
            border-color: #ff7b72;
        }

        @media (max-width: 600px) {
            .meme-grid { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
            .card-word { font-size: 1rem; }
        }
        @media (max-width: 380px) {
            .meme-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    // ===== RENDER =====
    const grid = document.getElementById('memeGrid');
    const countEl = document.getElementById('cardCount');
    let currentCat = 'all';
    let currentOrder = [...cards];

    function renderCards() {
        const filtered = currentCat === 'all' ? currentOrder : currentOrder.filter(c => c.cat === currentCat);
        grid.innerHTML = '';
        filtered.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'meme-card';
            div.dataset.cat = c.cat;
            div.innerHTML = `
                <div class="card-front">
                    <div class="card-emoji">${c.emoji}</div>
                    <div class="card-word">${c.word}</div>
                    <div class="card-hint">${c.hint}</div>
                </div>
                <div class="card-back">
                    <span class="cat-badge ${c.badgeClass}">${c.badge}</span>
                    <div class="card-translation">${c.translation}</div>
                    <div class="card-meme">${c.meme}<span class="lol">${c.lol}</span></div>
                </div>
                <span class="card-tap">нажми ↩</span>
            `;
            div.addEventListener('click', () => div.classList.toggle('flipped'));
            grid.appendChild(div);
        });
        countEl.textContent = `${filtered.length} карточек`;
    }

    // ===== FILTER =====
    document.querySelectorAll('.cat-pill').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCat = btn.dataset.cat;
            renderCards();
        });
    });

    // ===== SHUFFLE =====
    document.getElementById('shuffleBtn').addEventListener('click', () => {
        currentOrder = [...cards].sort(() => Math.random() - 0.5);
        renderCards();
    });

    renderCards();
    </script>
