<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Vocabulary | NeoStudy</title>
    <link rel="stylesheet" href="css/style.css?v=10">
    <link rel="stylesheet" href="css/englisch.css?v=10">
    <style>
        html { background: #0a0a14; }

        /* ===== LEVEL SELECTOR ===== */
        .level-tabs {
            display: flex;
            gap: 0.8rem;
            margin: 1rem 0 1.5rem;
            flex-wrap: wrap;
        }
        .level-btn {
            flex: 1;
            min-width: 120px;
            padding: 1.1rem 1.2rem;
            border-radius: 14px;
            background: rgba(13, 17, 23, 0.75);
            backdrop-filter: blur(6px);
            border: 2px solid transparent;
            color: var(--color-text);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .level-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.25s;
        }
        .level-btn:hover { transform: translateY(-2px); }

        /* B1 blue */
        .level-btn[data-level="b1"] { border-color: rgba(68, 147, 248, 0.3); }
        .level-btn[data-level="b1"]::before { background: linear-gradient(135deg, rgba(68, 147, 248, 0.12), transparent); }
        .level-btn[data-level="b1"]:hover { border-color: rgba(68, 147, 248, 0.6); }
        .level-btn[data-level="b1"].active {
            border-color: #4493f8;
            background: linear-gradient(135deg, rgba(68, 147, 248, 0.25), rgba(68, 147, 248, 0.08));
            box-shadow: 0 4px 24px rgba(68, 147, 248, 0.3), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .level-btn[data-level="b1"].active::before { opacity: 1; }

        /* B2 purple */
        .level-btn[data-level="b2"] { border-color: rgba(163, 113, 247, 0.3); }
        .level-btn[data-level="b2"]::before { background: linear-gradient(135deg, rgba(163, 113, 247, 0.12), transparent); }
        .level-btn[data-level="b2"]:hover { border-color: rgba(163, 113, 247, 0.6); }
        .level-btn[data-level="b2"].active {
            border-color: #a371f7;
            background: linear-gradient(135deg, rgba(163, 113, 247, 0.25), rgba(163, 113, 247, 0.08));
            box-shadow: 0 4px 24px rgba(163, 113, 247, 0.3), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .level-btn[data-level="b2"].active::before { opacity: 1; }

        /* C1 gold */
        .level-btn[data-level="c1"] { border-color: rgba(210, 153, 34, 0.3); }
        .level-btn[data-level="c1"]::before { background: linear-gradient(135deg, rgba(210, 153, 34, 0.12), transparent); }
        .level-btn[data-level="c1"]:hover { border-color: rgba(210, 153, 34, 0.6); }
        .level-btn[data-level="c1"].active {
            border-color: #d29922;
            background: linear-gradient(135deg, rgba(210, 153, 34, 0.25), rgba(210, 153, 34, 0.08));
            box-shadow: 0 4px 24px rgba(210, 153, 34, 0.3), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .level-btn[data-level="c1"].active::before { opacity: 1; }

        .level-btn .level-badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .level-btn[data-level="b1"] .level-badge { background: rgba(68, 147, 248, 0.2); color: #79b8ff; }
        .level-btn[data-level="b2"] .level-badge { background: rgba(163, 113, 247, 0.2); color: #c8a5ff; }
        .level-btn[data-level="c1"] .level-badge { background: rgba(210, 153, 34, 0.2); color: #e3b341; }
        .level-btn.active .level-badge { background: rgba(255,255,255,0.15); color: #fff; }

        .level-btn small {
            display: block;
            font-weight: 400;
            font-size: 0.78rem;
            opacity: 0.65;
            margin-top: 0.35rem;
        }

        /* ===== TOPIC PILLS ===== */
        .topic-pills {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 0 0 1.5rem;
        }
        .topic-pill {
            padding: 0.55rem 1.2rem;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--color-text-secondary);
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .topic-pill:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--color-text);
        }
        .topic-pill.active {
            background: rgba(68, 147, 248, 0.12);
            border-color: rgba(68, 147, 248, 0.4);
            color: #fff;
        }
        body.level-b2 .topic-pill.active {
            background: rgba(163, 113, 247, 0.12);
            border-color: rgba(163, 113, 247, 0.4);
        }
        body.level-c1 .topic-pill.active {
            background: rgba(210, 153, 34, 0.12);
            border-color: rgba(210, 153, 34, 0.4);
        }

        /* ===== WORD COUNT ===== */
        .vocab-count-bar {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--color-text-muted);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .vocab-count-bar .count-num {
            font-weight: 700;
            font-size: 1rem;
        }

        /* ===== VOCAB CARD GRID ===== */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.7rem;
        }

        /* ===== VOCAB CARD ===== */
        .vocab-card {
            position: relative;
            min-height: 130px;
            border-radius: 14px;
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: all 0.25s ease;
            overflow: hidden;
            perspective: 600px;
        }
        .vocab-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }
        .vocab-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            border-radius: 14px 0 0 14px;
        }
        body.level-b1 .vocab-card::before { background: #4493f8; }
        body.level-b2 .vocab-card::before { background: #a371f7; }
        body.level-c1 .vocab-card::before { background: #d29922; }

        .vocab-card .flip-icon {
            position: absolute;
            top: 0.6rem; right: 0.7rem;
            font-size: 0.8rem;
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        .vocab-card:hover .flip-icon { opacity: 0.6; }
        .vocab-card.flipped .flip-icon { opacity: 0; }

        .vocab-card .card-front {
            padding: 1.2rem 1.2rem 1rem 1.4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 130px;
        }
        .vocab-card .card-front .word-main {
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
        }

        .vocab-card .card-back {
            display: none;
            padding: 1.1rem 1.1rem 0.9rem 1.3rem;
            min-height: 160px;
        }
        .vocab-card.flipped .card-front { display: none; }
        .vocab-card.flipped .card-back { display: flex; flex-direction: column; justify-content: center; }

        .vocab-card .card-back .translation {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.3;
        }
        body.level-b1 .vocab-card .card-back .translation { color: #79b8ff; }
        body.level-b2 .vocab-card .card-back .translation { color: #c8a5ff; }
        body.level-c1 .vocab-card .card-back .translation { color: #e3b341; }

        .vocab-card .card-back .explanation {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.65);
            line-height: 1.5;
            margin-top: 0.4rem;
        }
        .vocab-card .card-back .example {
            font-size: 0.78rem;
            font-style: italic;
            color: var(--color-text-muted);
            margin-top: 0.5rem;
            line-height: 1.45;
        }
        .vocab-card .card-back .back-level {
            display: inline-block;
            margin-top: 0.6rem;
            padding: 0.1rem 0.5rem;
            border-radius: 10px;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            width: fit-content;
        }
        body.level-b1 .back-level { background: rgba(68, 147, 248, 0.15); color: #79b8ff; }
        body.level-b2 .back-level { background: rgba(163, 113, 247, 0.15); color: #c8a5ff; }
        body.level-c1 .back-level { background: rgba(210, 153, 34, 0.15); color: #e3b341; }

        .vocab-card::after {
            content: '';
            position: absolute;
            top: 0; left: 4px; right: 0;
            height: 1px;
            opacity: 0;
            transition: opacity 0.25s;
        }
        body.level-b1 .vocab-card::after { background: linear-gradient(90deg, rgba(68,147,248,0.5), transparent); }
        body.level-b2 .vocab-card::after { background: linear-gradient(90deg, rgba(163,113,247,0.5), transparent); }
        body.level-c1 .vocab-card::after { background: linear-gradient(90deg, rgba(210,153,34,0.5), transparent); }
        .vocab-card:hover::after { opacity: 1; }

        .section-label {
            color: var(--color-text-muted);
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.6rem;
        }

        @media (max-width: 600px) {
            .level-btn { padding: 0.8rem 0.6rem; font-size: 0.95rem; }
            .vocab-grid { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
            .vocab-card .card-front { padding: 1rem 0.8rem 0.8rem 1rem; min-height: 100px; }
            .vocab-card .card-back { padding: 1rem 0.8rem 0.8rem 1rem; min-height: 100px; }
            .vocab-card .card-front .word-main { font-size: 1rem; }
        }
        @media (max-width: 380px) {
            .vocab-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <script>
        // ===== English Vocabulary Data =====
        // Format: [English word/phrase, перевод, пояснение на русском, example sentence]
        const VOCAB = {

            // ===== CONNECTORS (linking words for Writing) =====
            'b1:connectors': [
                ['however', 'однако, тем не менее', 'Когда хочешь сказать что-то противоположное предыдущему. Ставишь в начало предложения + запятая', 'The test was difficult. However, most students passed it.'],
                ['therefore', 'поэтому, следовательно', 'Показывает результат или вывод из предыдущего предложения', 'She studied hard. Therefore, she got a good grade.'],
                ['although', 'хотя', 'В начале предложения &mdash; вводит факт, который кажется противоречием', 'Although it was raining, we went for a walk.'],
                ['because', 'потому что', 'Объясняет причину. Стоит перед причиной в предложении', 'I stayed home because I was feeling sick.'],
                ['for example', 'например', 'Когда приводишь конкретный пример к своему аргументу', 'Many countries face pollution. For example, India has severe air quality problems.'],
                ['in addition', 'кроме того, вдобавок', 'Добавляешь ещё один аргумент к уже сказанному', 'The hotel was expensive. In addition, the service was terrible.'],
                ['on the other hand', 'с другой стороны', 'Показываешь противоположную точку зрения &mdash; очень полезно в Writing!', 'Social media connects people. On the other hand, it can cause addiction.'],
                ['firstly / secondly / finally', 'во-первых / во-вторых / наконец', 'Структурирует твои аргументы &mdash; обязательно используй в Writing!', 'Firstly, sport keeps you healthy. Secondly, it reduces stress. Finally, it is fun.'],
                ['in my opinion', 'по моему мнению', 'Когда высказываешь свою точку зрения. Часто нужно в Writing ZP', 'In my opinion, school uniforms are a good idea.'],
                ['as a result', 'в результате, вследствие', 'Показывает последствие предыдущего действия или ситуации', 'He missed many lessons. As a result, he failed the exam.'],
                ['moreover', 'более того, к тому же', 'Добавляешь более сильный аргумент к предыдущему', 'The food was delicious. Moreover, the prices were very low.'],
                ['in conclusion', 'в заключение, подводя итог', 'Используй в конце текста, чтобы подвести итог', 'In conclusion, technology has both advantages and disadvantages.']
            ],
            'b2:connectors': [
                ['nevertheless', 'тем не менее', 'Как however, но более официальное. Означает &laquo;несмотря на это&raquo;', 'The plan had flaws. Nevertheless, they decided to go ahead with it.'],
                ['furthermore', 'кроме того, более того', 'Как moreover, но ещё официальнее. Добавляет весомый аргумент', 'The project saves money. Furthermore, it creates new jobs.'],
                ['whereas', 'тогда как, в то время как', 'Противопоставляет две разные ситуации в одном предложении', 'Some students prefer working alone, whereas others enjoy group work.'],
                ['despite / in spite of', 'несмотря на', 'После них идёт существительное или -ing форма (НЕ предложение!)', 'Despite the rain, the event was a huge success.'],
                ['consequently', 'вследствие этого, следовательно', 'Официальный способ показать результат или последствие', 'The company cut costs. Consequently, many people lost their jobs.'],
                ['on the one hand... on the other hand', 'с одной стороны... с другой', 'Идеальная конструкция для показа двух сторон проблемы в эссе', 'On the one hand, cars are convenient. On the other hand, they pollute the air.'],
                ['due to', 'из-за, благодаря, вследствие', 'Показывает причину. После due to идёт существительное, не предложение', 'The match was cancelled due to heavy rain.'],
                ['in contrast', 'в противоположность, напротив', 'Противопоставляет два факта или ситуации', 'Life in the city is fast. In contrast, the countryside is peaceful.'],
                ['as long as', 'пока, при условии что', 'Ставит условие &mdash; &laquo;это будет так, ЕСЛИ выполнится вот это&raquo;', 'You can go out as long as you finish your homework first.'],
                ['to sum up', 'подводя итог', 'Более официальный вариант in conclusion для завершения текста', 'To sum up, both options have their pros and cons.'],
                ['not only... but also', 'не только... но и', 'Усиливает аргумент &mdash; &laquo;это ещё не всё, есть и другое!&raquo;', 'She is not only intelligent but also very creative.'],
                ['even though', 'даже несмотря на то, что', 'Сильнее чем although &mdash; подчёркивает неожиданность', 'Even though he was tired, he kept studying until midnight.']
            ],
            'c1:connectors': [
                ['notwithstanding', 'несмотря на', 'Очень официальное слово. Как despite, но академичнее', 'Notwithstanding the criticism, the law was passed.'],
                ['hence', 'отсюда, поэтому', 'Формальный вариант therefore. Часто в академических текстах', 'Costs have risen sharply; hence, prices will increase.'],
                ['provided that', 'при условии, что', 'Официальный способ поставить условие &mdash; как if, но формальнее', 'You may leave early, provided that you finish all your work.'],
                ['with regard to', 'относительно, касательно', 'Когда переходишь к новой теме или аспекту проблемы', 'With regard to education, the government has announced new reforms.'],
                ['it is worth noting that', 'стоит отметить, что', 'Привлекает внимание к важному факту &mdash; круто для эссе', 'It is worth noting that the results vary across different age groups.'],
                ['in light of', 'в свете, с учётом', 'Учитывая определённую информацию или обстоятельства', 'In light of recent events, the policy has been updated.'],
                ['be that as it may', 'как бы то ни было', 'Признаёшь факт, но дальше говоришь &laquo;но это не меняет моё мнение&raquo;', 'The project is expensive. Be that as it may, the benefits outweigh the costs.'],
                ['thereby', 'тем самым, благодаря чему', 'Показывает, как одно действие приводит к другому', 'They reduced waste, thereby saving money and protecting the environment.'],
                ['insofar as', 'настолько, насколько', 'Ограничивает утверждение &mdash; &laquo;это правда, но только в определённом смысле&raquo;', 'The theory is useful insofar as it explains basic patterns.'],
                ['all things considered', 'учитывая всё', 'Итог с учётом всех аргументов &mdash; идеально для заключения', 'All things considered, the advantages of remote work outweigh the drawbacks.'],
                ['admittedly', 'надо признать', 'Признаёшь что-то в пользу противоположной стороны перед своим аргументом', 'Admittedly, the old system was cheaper. However, it was far less efficient.'],
                ['by the same token', 'по той же причине', 'Добавляет аргумент, следующий из той же логики', 'We expect students to be punctual. By the same token, teachers should set an example.']
            ],

            // ===== EVERYDAY LIFE =====
            'b1:everyday': [
                ['to afford', 'позволить себе (финансово)', 'Когда у тебя достаточно денег на что-то. Часто с can/canʼt', 'Many families cannot afford to go on holiday every year.'],
                ['neighbourhood', 'район, соседство', 'Место, где ты живёшь, и люди вокруг тебя', 'Our neighbourhood is quiet and safe for children.'],
                ['to complain', 'жаловаться', 'Говорить, что тебе что-то не нравится, что что-то плохо', 'Customers often complain about the long waiting times.'],
                ['convenient', 'удобный', 'Когда что-то легко использовать или подходит по времени/месту', 'Online shopping is very convenient for busy people.'],
                ['responsibility', 'ответственность', 'Обязанность что-то делать или за что-то отвечать', 'It is our responsibility to protect the environment.'],
                ['to support', 'поддерживать', 'Помогать кому-то &mdash; словом, деньгами, присутствием', 'Friends should support each other in difficult times.'],
                ['experience', 'опыт / переживание', 'То, что ты пережил или чему научился за жизнь', 'Travelling gives you new experiences and broadens your mind.'],
                ['to improve', 'улучшать', 'Делать что-то лучше, чем было раньше', 'She wants to improve her English before the exam.'],
                ['advantage / disadvantage', 'преимущество / недостаток', 'Плюс и минус чего-то. Очень частое слово в Writing!', 'One advantage of city life is public transport. A disadvantage is the noise.'],
                ['to avoid', 'избегать', 'Не делать чего-то намеренно, обходить стороной', 'You should avoid eating too much sugar.'],
                ['opportunity', 'возможность, шанс', 'Хорошая возможность сделать что-то полезное', 'University gives you the opportunity to meet new people.'],
                ['behaviour', 'поведение', 'Как человек себя ведёт &mdash; хорошо или плохо', 'His behaviour in class has improved a lot this year.']

                ['to nurture', 'взращивать, воспитывать', 'Заботливо развивать &mdash; таланты, способности, потенциал', 'It is essential to nurture each studentʼs individual potential.'],
                ['pedagogy', 'педагогика', 'Наука и искусство обучения &mdash; как правильно учить', 'Modern pedagogy emphasizes student-centered learning.'],
                ['socioeconomic', 'социально-экономический', 'Связанный и с социальным статусом, и с деньгами', 'Socioeconomic background should not determine educational success.']
            ]
        };

        const TOPIC_META = {
            connectors: { icon: '\u{1F517}', title: 'Connectors' },
            everyday: { icon: '\u{1F3E0}', title: 'Everyday Life' },
            environment: { icon: '\u{1F33F}', title: 'Environment' },
            media: { icon: '\u{1F4F1}', title: 'Media & Technology' },
            school: { icon: '\u{1F393}', title: 'School & Future' }
        };

        let currentLevel = 'b1';
        let currentTopic = 'connectors';

        function renderVocab() {
            const key = currentLevel + ':' + currentTopic;
            const data = VOCAB[key] || [];
            const grid = document.getElementById('vocab-grid');
            const meta = TOPIC_META[currentTopic];
            const lvl = currentLevel.toUpperCase();

            document.body.classList.remove('level-b1', 'level-b2', 'level-c1');
            document.body.classList.add('level-' + currentLevel);

            document.getElementById('vocab-icon').innerHTML = meta.icon;
            document.getElementById('vocab-title').textContent = meta.title + ' \u2014 ' + lvl;
            document.getElementById('vocab-count').innerHTML = '<span class="count-num">' + data.length + '</span> words';

            grid.innerHTML = data.map(function(item) {
                return '<div class="vocab-card">' +
                    '<span class="flip-icon">\u{1F504}</span>' +
                    '<div class="card-front">' +
                        '<div class="word-main">' + item[0] + '</div>' +
                    '</div>' +
                    '<div class="card-back">' +
                        '<div class="translation">' + item[1] + '</div>' +
                        '<div class="explanation">' + item[2] + '</div>' +
                        '<div class="example">\u00ab' + item[3] + '\u00bb</div>' +
                        '<span class="back-level">' + lvl + '</span>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        // Level buttons
        document.querySelectorAll('.level-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.level-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentLevel = btn.dataset.level;
                renderVocab();
            });
        });

        // Topic pills
        document.querySelectorAll('.topic-pill').forEach(function(pill) {
            pill.addEventListener('click', function() {
                document.querySelectorAll('.topic-pill').forEach(function(p) { p.classList.remove('active'); });
                pill.classList.add('active');
                currentTopic = pill.dataset.topic;
                renderVocab();
            });
        });

        // Flashcard flip
        document.addEventListener('click', function(e) {
            var card = e.target.closest('.vocab-card');
            if (card) card.classList.toggle('flipped');
        });

        renderVocab();
    </script>
</body>
</html>
