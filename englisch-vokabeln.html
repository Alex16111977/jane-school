<head>

    <link rel="stylesheet" href="css/englisch.css?v=10">
    <style>
        html { background: #0a0a14; }

        /* ===== LEVEL SELECTOR ===== */
        .level-tabs {
            display: flex;
            gap: 0.8rem;
            margin: 1rem 0 1.5rem;
            flex-wrap: wrap;
        }
        .level-btn {
            flex: 1;
            min-width: 120px;
            padding: 1.1rem 1.2rem;
            border-radius: 14px;
            background: rgba(13, 17, 23, 0.75);
            backdrop-filter: blur(6px);
            border: 2px solid transparent;
            color: var(--color-text);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .level-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.25s;
        }
        .level-btn:hover { transform: translateY(-2px); }

        /* B1 blue */
        .level-btn[data-level="b1"] { border-color: rgba(68, 147, 248, 0.3); }
        .level-btn[data-level="b1"]::before { background: linear-gradient(135deg, rgba(68, 147, 248, 0.12), transparent); }
        .level-btn[data-level="b1"]:hover { border-color: rgba(68, 147, 248, 0.6); }
        .level-btn[data-level="b1"].active {
            border-color: #4493f8;
            background: linear-gradient(135deg, rgba(68, 147, 248, 0.25), rgba(68, 147, 248, 0.08));
            box-shadow: 0 4px 24px rgba(68, 147, 248, 0.3), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .level-btn[data-level="b1"].active::before { opacity: 1; }

        /* B2 purple */
        .level-btn[data-level="b2"] { border-color: rgba(163, 113, 247, 0.3); }
        .level-btn[data-level="b2"]::before { background: linear-gradient(135deg, rgba(163, 113, 247, 0.12), transparent); }
        .level-btn[data-level="b2"]:hover { border-color: rgba(163, 113, 247, 0.6); }
        .level-btn[data-level="b2"].active {
            border-color: #a371f7;
            background: linear-gradient(135deg, rgba(163, 113, 247, 0.25), rgba(163, 113, 247, 0.08));
            box-shadow: 0 4px 24px rgba(163, 113, 247, 0.3), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .level-btn[data-level="b2"].active::before { opacity: 1; }

        /* C1 gold */
        .level-btn[data-level="c1"] { border-color: rgba(210, 153, 34, 0.3); }
        .level-btn[data-level="c1"]::before { background: linear-gradient(135deg, rgba(210, 153, 34, 0.12), transparent); }
        .level-btn[data-level="c1"]:hover { border-color: rgba(210, 153, 34, 0.6); }
        .level-btn[data-level="c1"].active {
            border-color: #d29922;
            background: linear-gradient(135deg, rgba(210, 153, 34, 0.25), rgba(210, 153, 34, 0.08));
            box-shadow: 0 4px 24px rgba(210, 153, 34, 0.3), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .level-btn[data-level="c1"].active::before { opacity: 1; }

        .level-btn .level-badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .level-btn[data-level="b1"] .level-badge { background: rgba(68, 147, 248, 0.2); color: #79b8ff; }
        .level-btn[data-level="b2"] .level-badge { background: rgba(163, 113, 247, 0.2); color: #c8a5ff; }
        .level-btn[data-level="c1"] .level-badge { background: rgba(210, 153, 34, 0.2); color: #e3b341; }
        .level-btn.active .level-badge { background: rgba(255,255,255,0.15); color: #fff; }

        .level-btn small {
            display: block;
            font-weight: 400;
            font-size: 0.78rem;
            opacity: 0.65;
            margin-top: 0.35rem;
        }

        /* ===== TOPIC PILLS ===== */
        .topic-pills {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 0 0 1.5rem;
        }
        .topic-pill {
            padding: 0.55rem 1.2rem;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--color-text-secondary);
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .topic-pill:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--color-text);
        }
        .topic-pill.active {
            background: rgba(68, 147, 248, 0.12);
            border-color: rgba(68, 147, 248, 0.4);
            color: #fff;
        }
        body.level-b2 .topic-pill.active {
            background: rgba(163, 113, 247, 0.12);
            border-color: rgba(163, 113, 247, 0.4);
        }
        body.level-c1 .topic-pill.active {
            background: rgba(210, 153, 34, 0.12);
            border-color: rgba(210, 153, 34, 0.4);
        }

        /* ===== WORD COUNT ===== */
        .vocab-count-bar {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--color-text-muted);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .vocab-count-bar .count-num {
            font-weight: 700;
            font-size: 1rem;
        }

        /* ===== VOCAB CARD GRID ===== */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.7rem;
        }

        /* ===== VOCAB CARD ===== */
        .vocab-card {
            position: relative;
            min-height: 130px;
            border-radius: 14px;
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: all 0.25s ease;
            overflow: hidden;
            perspective: 600px;
        }
        .vocab-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }
        .vocab-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            border-radius: 14px 0 0 14px;
        }
        body.level-b1 .vocab-card::before { background: #4493f8; }
        body.level-b2 .vocab-card::before { background: #a371f7; }
        body.level-c1 .vocab-card::before { background: #d29922; }

        .vocab-card .flip-icon {
            position: absolute;
            top: 0.6rem; right: 0.7rem;
            font-size: 0.8rem;
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        .vocab-card:hover .flip-icon { opacity: 0.6; }
        .vocab-card.flipped .flip-icon { opacity: 0; }

        .vocab-card .card-front {
            padding: 1.2rem 1.2rem 1rem 1.4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 130px;
        }
        .vocab-card .card-front .word-main {
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
        }

        .vocab-card .card-back {
            display: none;
            padding: 1.1rem 1.1rem 0.9rem 1.3rem;
            min-height: 160px;
        }
        .vocab-card.flipped .card-front { display: none; }
        .vocab-card.flipped .card-back { display: flex; flex-direction: column; justify-content: center; }

        .vocab-card .card-back .translation {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.3;
        }
        body.level-b1 .vocab-card .card-back .translation { color: #79b8ff; }
        body.level-b2 .vocab-card .card-back .translation { color: #c8a5ff; }
        body.level-c1 .vocab-card .card-back .translation { color: #e3b341; }

        .vocab-card .card-back .explanation {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.65);
            line-height: 1.5;
            margin-top: 0.4rem;
        }
        .vocab-card .card-back .example {
            font-size: 0.78rem;
            font-style: italic;
            color: var(--color-text-muted);
            margin-top: 0.5rem;
            line-height: 1.45;
        }
        .vocab-card .card-back .back-level {
            display: inline-block;
            margin-top: 0.6rem;
            padding: 0.1rem 0.5rem;
            border-radius: 10px;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            width: fit-content;
        }
        body.level-b1 .back-level { background: rgba(68, 147, 248, 0.15); color: #79b8ff; }
        body.level-b2 .back-level { background: rgba(163, 113, 247, 0.15); color: #c8a5ff; }
        body.level-c1 .back-level { background: rgba(210, 153, 34, 0.15); color: #e3b341; }

        .vocab-card::after {
            content: '';
            position: absolute;
            top: 0; left: 4px; right: 0;
            height: 1px;
            opacity: 0;
            transition: opacity 0.25s;
        }
        body.level-b1 .vocab-card::after { background: linear-gradient(90deg, rgba(68,147,248,0.5), transparent); }
        body.level-b2 .vocab-card::after { background: linear-gradient(90deg, rgba(163,113,247,0.5), transparent); }
        body.level-c1 .vocab-card::after { background: linear-gradient(90deg, rgba(210,153,34,0.5), transparent); }
        .vocab-card:hover::after { opacity: 1; }

        .section-label {
            color: var(--color-text-muted);
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.6rem;
        }

        @media (max-width: 600px) {
            .level-btn { padding: 0.8rem 0.6rem; font-size: 0.95rem; }
            .vocab-grid { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
            .vocab-card .card-front { padding: 1rem 0.8rem 0.8rem 1rem; min-height: 100px; }
            .vocab-card .card-back { padding: 1rem 0.8rem 0.8rem 1rem; min-height: 100px; }
            .vocab-card .card-front .word-main { font-size: 1rem; }
        }
        @media (max-width: 380px) {
            .vocab-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <script>
        // ===== English Vocabulary Data =====
        // Format: [English word/phrase, переклад, пояснення українською, example sentence]
        const VOCAB = {

            // ===== CONNECTORS (linking words for Writing) =====
            'b1:connectors': [
                ['however', 'однак, проте', 'Коли хочеш сказати щось протилежне попередньому. Ставиш на початок речення + кома', 'The test was difficult. However, most students passed it.'],
                ['therefore', 'тому, отже', 'Показує результат або висновок з попереднього речення', 'She studied hard. Therefore, she got a good grade.'],
                ['although', 'хоча', 'На початку речення &mdash; вводить факт, який здається протиріччям', 'Although it was raining, we went for a walk.'],
                ['because', 'тому що', 'Пояснює причину. Стоїть перед причиною в реченні', 'I stayed home because I was feeling sick.'],
                ['for example', 'наприклад', 'Коли наводиш конкретний приклад до свого аргументу', 'Many countries face pollution. For example, India has severe air quality problems.'],
                ['in addition', 'крім того, на додаток', 'Додаєш ще один аргумент до вже сказаного', 'The hotel was expensive. In addition, the service was terrible.'],
                ['on the other hand', 'з іншого боку', 'Показуєш протилежну точку зору &mdash; дуже корисно в Writing!', 'Social media connects people. On the other hand, it can cause addiction.'],
                ['firstly / secondly / finally', 'по-перше / по-друге / нарешті', 'Структурує твої аргументи &mdash; обовʼязково використовуй у Writing!', 'Firstly, sport keeps you healthy. Secondly, it reduces stress. Finally, it is fun.'],
                ['in my opinion', 'на мою думку', 'Коли висловлюєш свою точку зору. Часто треба в Writing ZP', 'In my opinion, school uniforms are a good idea.'],
                ['as a result', 'як результат, внаслідок', 'Показує наслідок попередньої дії або ситуації', 'He missed many lessons. As a result, he failed the exam.'],
                ['moreover', 'більше того, до того ж', 'Додаєш сильніший аргумент до попереднього', 'The food was delicious. Moreover, the prices were very low.'],
                ['in conclusion', 'на завершення, підсумовуючи', 'Використовуй у кінці тексту, щоб підвести підсумок', 'In conclusion, technology has both advantages and disadvantages.']
            ],
            'b2:connectors': [
                ['nevertheless', 'тим не менш', 'Як however, але більш офіційне. Означає &laquo;незважаючи на це&raquo;', 'The plan had flaws. Nevertheless, they decided to go ahead with it.'],
                ['furthermore', 'крім того, більш того', 'Як moreover, але ще офіційніше. Додає вагомий аргумент', 'The project saves money. Furthermore, it creates new jobs.'],
                ['whereas', 'тоді як, в той час як', 'Протиставляє дві різні ситуації в одному реченні', 'Some students prefer working alone, whereas others enjoy group work.'],
                ['despite / in spite of', 'незважаючи на', 'Після них йде іменник або -ing форма (НЕ речення!)', 'Despite the rain, the event was a huge success.'],
                ['consequently', 'внаслідок цього, отже', 'Офіційний спосіб показати результат або наслідок', 'The company cut costs. Consequently, many people lost their jobs.'],
                ['on the one hand... on the other hand', 'з одного боку... з іншого', 'Ідеальна конструкція для показу двох сторін проблеми в есе', 'On the one hand, cars are convenient. On the other hand, they pollute the air.'],
                ['due to', 'через, завдяки, внаслідок', 'Показує причину. Після due to йде іменник, не речення', 'The match was cancelled due to heavy rain.'],
                ['in contrast', 'на противагу, навпаки', 'Протиставляє два факти або ситуації', 'Life in the city is fast. In contrast, the countryside is peaceful.'],
                ['as long as', 'доки, за умови що', 'Ставить умову &mdash; &laquo;це буде так, ЯКЩО виконається ось це&raquo;', 'You can go out as long as you finish your homework first.'],
                ['to sum up', 'підсумовуючи', 'Офіційніший варіант in conclusion для закінчення тексту', 'To sum up, both options have their pros and cons.'],
                ['not only... but also', 'не тільки... але й', 'Підсилює аргумент &mdash; &laquo;це ще не все, є й інше!&raquo;', 'She is not only intelligent but also very creative.'],
                ['even though', 'навіть попри те, що', 'Сильніше за although &mdash; підкреслює несподіваність', 'Even though he was tired, he kept studying until midnight.']
            ],
            'c1:connectors': [
                ['notwithstanding', 'незважаючи на', 'Дуже офіційне слово. Як despite, але академічніше', 'Notwithstanding the criticism, the law was passed.'],
                ['hence', 'звідси, тому', 'Формальний варіант therefore. Часто в академічних текстах', 'Costs have risen sharply; hence, prices will increase.'],
                ['provided that', 'за умови, що', 'Офіційний спосіб поставити умову &mdash; як if, але формальніше', 'You may leave early, provided that you finish all your work.'],
                ['with regard to', 'стосовно, щодо', 'Коли переходиш до нової теми або аспекту проблеми', 'With regard to education, the government has announced new reforms.'],
                ['it is worth noting that', 'варто зазначити, що', 'Привертає увагу до важливого факту &mdash; круто для есе', 'It is worth noting that the results vary across different age groups.'],
                ['in light of', 'з огляду на, у світлі', 'Враховуючи певну інформацію або обставини', 'In light of recent events, the policy has been updated.'],
                ['be that as it may', 'хай там як', 'Визнаєш факт, але далі кажеш &laquo;але це не змінює мою думку&raquo;', 'The project is expensive. Be that as it may, the benefits outweigh the costs.'],
                ['thereby', 'тим самим, завдяки чому', 'Показує, як одна дія призводить до іншої', 'They reduced waste, thereby saving money and protecting the environment.'],
                ['insofar as', 'настільки, наскільки', 'Обмежує твердження &mdash; &laquo;це правда, але тільки в певному сенсі&raquo;', 'The theory is useful insofar as it explains basic patterns.'],
                ['all things considered', 'враховуючи все', 'Підсумок з урахуванням усіх аргументів &mdash; ідеально для висновку', 'All things considered, the advantages of remote work outweigh the drawbacks.'],
                ['admittedly', 'треба визнати', 'Визнаєш щось на користь протилежної сторони перед своїм аргументом', 'Admittedly, the old system was cheaper. However, it was far less efficient.'],
                ['by the same token', 'з тієї ж причини', 'Додає аргумент, що слідує з тієї ж логіки', 'We expect students to be punctual. By the same token, teachers should set an example.']
            ],

            // ===== EVERYDAY LIFE =====
            'b1:everyday': [
                ['to afford', 'дозволити собі (фінансово)', 'Коли маєш достатньо грошей на щось. Часто з can/canʼt', 'Many families cannot afford to go on holiday every year.'],
                ['neighbourhood', 'район, сусідство', 'Місце, де ти живеш, і люди навколо тебе', 'Our neighbourhood is quiet and safe for children.'],
                ['to complain', 'скаржитись', 'Говорити, що тобі щось не подобається, що щось погано', 'Customers often complain about the long waiting times.'],
                ['convenient', 'зручний', 'Коли щось легко використовувати або підходить за часом/місцем', 'Online shopping is very convenient for busy people.'],
                ['responsibility', 'відповідальність', 'Обовʼязок щось робити або за щось відповідати', 'It is our responsibility to protect the environment.'],
                ['to support', 'підтримувати', 'Допомагати комусь &mdash; словом, грошима, присутністю', 'Friends should support each other in difficult times.'],
                ['experience', 'досвід / переживання', 'Те, що ти пережив або навчився за життя', 'Travelling gives you new experiences and broadens your mind.'],
                ['to improve', 'покращувати', 'Робити щось кращим, ніж було раніше', 'She wants to improve her English before the exam.'],

                ['to demand', 'вимагати', 'Наполягати на чомусь рішуче', 'The modern job market demands flexibility and digital skills.'],
                ['vocational training', 'професійне навчання', 'Навчання конкретній професії &mdash; не університет, а Ausbildung', 'In Germany, vocational training is an important alternative to university.'],
                ['lifelong learning', 'навчання впродовж життя', 'Ідея, що людина вчиться завжди &mdash; і в 20, і в 50 років', 'In a changing world, lifelong learning is essential.'],
                ['equal opportunities', 'рівні можливості', 'Коли у кожного однакові шанси на успіх, незалежно від походження', 'Every child deserves equal opportunities in education.']
            ],
            'c1:school': [
                ['meritocracy', 'меритократія', 'Система, де успіх залежить від здібностей, а не від грошей чи звʼязків', 'Critics argue that true meritocracy does not exist in modern education.'],
                ['to foster', 'сприяти, виховувати', 'Допомагати чомусь рости і розвиватися &mdash; талантам, навичкам', 'Schools should foster creativity and independent thinking.'],
                ['disparity', 'нерівність, розбіжність', 'Велика різниця між групами людей &mdash; в можливостях, доходах', 'There is a growing disparity between students from rich and poor families.'],
                ['to empower', 'надавати сили, наділяти правами', 'Давати людям впевненість і інструменти для самостійних дій', 'Education empowers young people to shape their own future.'],
                ['to hinder', 'перешкоджати, заважати', 'Робити щось важчим або неможливим', 'Poverty can hinder access to quality education.'],
                ['cognitive', 'когнітивний, розумовий', 'Повʼязаний з мисленням, памʼяттю, увагою', 'Sleep deprivation negatively affects cognitive performance in school.'],
                ['to equip', 'оснащувати, готувати', 'Давати комусь необхідні знання та навички', 'Schools must equip students with the skills needed for the 21st century.'],
                ['the achievement gap', 'розрив у досягненнях', 'Різниця в результатах між учнями з різних соціальних верств', 'Closing the achievement gap remains a key goal of education policy.'],
                ['holistic', 'цілісний, комплексний', 'Який розглядає людину в цілому &mdash; не тільки знання, а й емоції, здоровʼя', 'A holistic approach to education includes mental health support.'],
                ['to nurture', 'плекати, виховувати', 'Дбайливо розвивати &mdash; таланти, здібності, потенціал', 'It is essential to nurture each studentʼs individual potential.'],
                ['pedagogy', 'педагогіка', 'Наука і мистецтво навчання &mdash; як правильно вчити', 'Modern pedagogy emphasizes student-centered learning.'],
                ['socioeconomic', 'соціально-економічний', 'Повʼязаний і з соціальним статусом, і з грошами', 'Socioeconomic background should not determine educational success.']
            ]
        };

        const TOPIC_META = {
            connectors: { icon: '\u{1F517}', title: 'Connectors' },
            everyday: { icon: '\u{1F3E0}', title: 'Everyday Life' },
            environment: { icon: '\u{1F33F}', title: 'Environment' },
            media: { icon: '\u{1F4F1}', title: 'Media & Technology' },
            school: { icon: '\u{1F393}', title: 'School & Future' }
        };

        let currentLevel = 'b1';
        let currentTopic = 'connectors';

        function renderVocab() {
            const key = currentLevel + ':' + currentTopic;
            const data = VOCAB[key] || [];
            const grid = document.getElementById('vocab-grid');
            const meta = TOPIC_META[currentTopic];
            const lvl = currentLevel.toUpperCase();

            document.body.classList.remove('level-b1', 'level-b2', 'level-c1');
            document.body.classList.add('level-' + currentLevel);

            document.getElementById('vocab-icon').innerHTML = meta.icon;
            document.getElementById('vocab-title').textContent = meta.title + ' \u2014 ' + lvl;
            document.getElementById('vocab-count').innerHTML = '<span class="count-num">' + data.length + '</span> words';

            grid.innerHTML = data.map(function(item) {
                return '<div class="vocab-card">' +
                    '<span class="flip-icon">\u{1F504}</span>' +
                    '<div class="card-front">' +
                        '<div class="word-main">' + item[0] + '</div>' +
                    '</div>' +
                    '<div class="card-back">' +
                        '<div class="translation">' + item[1] + '</div>' +
                        '<div class="explanation">' + item[2] + '</div>' +
                        '<div class="example">\u00ab' + item[3] + '\u00bb</div>' +
                        '<span class="back-level">' + lvl + '</span>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        // Level buttons
        document.querySelectorAll('.level-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.level-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentLevel = btn.dataset.level;
                renderVocab();
            });
        });

        // Topic pills
        document.querySelectorAll('.topic-pill').forEach(function(pill) {
            pill.addEventListener('click', function() {
                document.querySelectorAll('.topic-pill').forEach(function(p) { p.classList.remove('active'); });
                pill.classList.add('active');
                currentTopic = pill.dataset.topic;
                renderVocab();
            });
        });

        // Flashcard flip
        document.addEventListener('click', function(e) {
            var card = e.target.closest('.vocab-card');
            if (card) card.classList.toggle('flipped');
        });

        renderVocab();
    </script>
</body>
</html>
