    <style>
        html, body { background: #0a0a14; }

        /* ===== HERO ===== */
        .eb-hero {
            text-align: center;
            padding: 2.5rem 1rem 1rem;
        }
        .eb-title {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            line-height: 1.1;
            background: linear-gradient(135deg, #ff7b72, #ffa040, #f0c040, #7ee787, #58a6ff, #d2a8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 300%;
            animation: rainbow 6s linear infinite alternate;
            letter-spacing: -0.02em;
        }
        @keyframes rainbow {
            0%   { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        .eb-sub {
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* ===== PILLS ===== */
        .eb-pills {
            display: flex;
            gap: 0.45rem;
            flex-wrap: wrap;
            margin: 1.2rem 0 0.6rem;
        }
        .eb-pill {
            padding: 0.38rem 0.95rem;
            border-radius: 50px;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.45);
            font-size: 0.83rem;
            cursor: pointer;
            transition: all 0.16s;
            user-select: none;
        }
        .eb-pill:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .eb-pill.active { color: #fff; border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.08); }

        /* ===== CONTROLS ===== */
        .eb-controls {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            flex-wrap: wrap;
            margin-bottom: 1.1rem;
        }
        .eb-btn {
            padding: 0.42rem 1rem;
            border-radius: 20px;
            border: 1.5px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.6);
            font-size: 0.84rem;
            cursor: pointer;
            transition: all 0.16s;
        }
        .eb-btn:hover { background: rgba(255,255,255,0.09); color: #fff; border-color: rgba(255,255,255,0.25); }
        .eb-count { font-size: 0.8rem; color: rgba(255,255,255,0.25); }

        /* ===== GRID ===== */
        .eb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.8rem;
        }

        /* ===== CARD ===== */
        .eb-card {
            position: relative;
            border-radius: 18px;
            background: rgba(15,18,28,0.92);
            border: 1.5px solid rgba(255,255,255,0.07);
            cursor: pointer;
            min-height: 155px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }
        .eb-card:hover {
            transform: translateY(-5px) rotate(-0.5deg);
            box-shadow: 0 18px 50px rgba(0,0,0,0.65);
            border-color: rgba(255,255,255,0.2);
        }

        /* полоска слева */
        .eb-card::after {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            border-radius: 18px 0 0 18px;
        }
        /* свечение при ховере */
        .eb-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            opacity: 0;
            transition: opacity 0.25s;
        }
        .eb-card:hover::before { opacity: 1; }

        /* цвет по "силе" выражения */
        .eb-card[data-level="mild"]::after   { background: linear-gradient(#7ee787,#56d364); }
        .eb-card[data-level="medium"]::after { background: linear-gradient(#f0c040,#e3a832); }
        .eb-card[data-level="spicy"]::after  { background: linear-gradient(#ff7b72,#f85149); }
        .eb-card[data-level="epic"]::after   { background: linear-gradient(#d2a8ff,#a371f7); }

        .eb-card[data-level="mild"]::before   { background: radial-gradient(ellipse at 0 0, rgba(126,231,135,0.07), transparent 60%); }
        .eb-card[data-level="medium"]::before { background: radial-gradient(ellipse at 0 0, rgba(240,192,64,0.07), transparent 60%); }
        .eb-card[data-level="spicy"]::before  { background: radial-gradient(ellipse at 0 0, rgba(255,123,114,0.07), transparent 60%); }
        .eb-card[data-level="epic"]::before   { background: radial-gradient(ellipse at 0 0, rgba(210,168,255,0.07), transparent 60%); }

        /* FRONT */
        .eb-front, .eb-back {
            padding: 1.1rem 1.1rem 1rem 1.5rem;
            min-height: 155px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .eb-back { display: none; }
        .eb-card.flipped .eb-front { display: none; }
        .eb-card.flipped .eb-back  { display: flex; }

        .eb-word {
            font-size: 1.25rem;
            font-weight: 900;
            color: #fff;
            line-height: 1.25;
            margin-bottom: 0.3rem;
            letter-spacing: -0.01em;
        }
        .eb-when {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
            font-style: italic;
        }

        /* уровень-шкала на карточке front */
        .eb-heat {
            display: flex;
            gap: 3px;
            margin-top: 0.6rem;
        }
        .eb-heat span {
            width: 18px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.1);
        }
        .eb-card[data-level="mild"]   .eb-heat span:nth-child(-n+1) { background: #7ee787; }
        .eb-card[data-level="medium"] .eb-heat span:nth-child(-n+2) { background: #f0c040; }
        .eb-card[data-level="spicy"]  .eb-heat span:nth-child(-n+3) { background: #ff7b72; }
        .eb-card[data-level="epic"]   .eb-heat span:nth-child(-n+4) { background: #d2a8ff; }

        .eb-tap {
            position: absolute;
            bottom: 0.6rem;
            right: 0.8rem;
            font-size: 0.67rem;
            color: rgba(255,255,255,0.16);
            transition: color 0.2s;
        }
        .eb-card:hover .eb-tap { color: rgba(255,255,255,0.35); }
        .eb-card.flipped .eb-tap { display: none; }

        /* BACK */
        .eb-badge {
            display: inline-block;
            font-size: 0.63rem;
            font-weight: 700;
            letter-spacing: 0.07em;
            padding: 0.1rem 0.5rem;
            border-radius: 20px;
            margin-bottom: 0.45rem;
            width: fit-content;
            text-transform: uppercase;
        }
        .badge-mild   { background: rgba(126,231,135,0.15); color: #7ee787; }
        .badge-medium { background: rgba(240,192,64,0.15);  color: #f0c040; }
        .badge-spicy  { background: rgba(255,123,114,0.15); color: #ff7b72; }
        .badge-epic   { background: rgba(210,168,255,0.15); color: #d2a8ff; }

        .eb-meaning {
            font-size: 1rem;
            font-weight: 800;
            line-height: 1.35;
            margin-bottom: 0.35rem;
        }
        .eb-card[data-level="mild"]   .eb-meaning { color: #7ee787; }
        .eb-card[data-level="medium"] .eb-meaning { color: #f0c040; }
        .eb-card[data-level="spicy"]  .eb-meaning { color: #ff7b72; }
        .eb-card[data-level="epic"]   .eb-meaning { color: #d2a8ff; }

        .eb-origin {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
        }
        .eb-example {
            display: block;
            margin-top: 0.5rem;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.28);
            font-style: italic;
            line-height: 1.45;
            border-left: 2px solid rgba(255,255,255,0.1);
            padding-left: 0.5rem;
        }

        /* ===== PAGE WRAP ===== */
        .page-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.2rem 4rem;
        }

        @media (max-width: 600px) {
            .eb-grid { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
            .eb-front, .eb-back { min-height: 130px; padding: 0.9rem 0.9rem 0.8rem 1.1rem; }
            .eb-word { font-size: 1.05rem; }
        }
        @media (max-width: 380px) {
            .eb-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    let currentFilter = 'all';
    let order = [...cards];

    function heatBar() {
        return `<div class="eb-heat"><span></span><span></span><span></span><span></span></div>`;
    }

    function render() {
        const grid = document.getElementById('ebGrid');
        const filtered = currentFilter === 'all' ? order : order.filter(c => c.level === currentFilter);
        grid.innerHTML = '';
        filtered.forEach(c => {
            const div = document.createElement('div');
            div.className = 'eb-card';
            div.dataset.level = c.level;
            div.innerHTML = `
                <div class="eb-front">
                    <div class="eb-word">${c.word}</div>
                    <div class="eb-when">${c.when}</div>
                    ${heatBar()}
                </div>
                <div class="eb-back">
                    <span class="eb-badge ${c.badgeClass}">${c.badge}</span>
                    <div class="eb-meaning">${c.meaning}</div>
                    <div class="eb-origin">${c.origin}<span class="eb-example">${c.example}</span></div>
                </div>
                <span class="eb-tap">тыкни ↩</span>
            `;
            div.addEventListener('click', () => div.classList.toggle('flipped'));
            grid.appendChild(div);
        });
        document.getElementById('ebCount').textContent = filtered.length + ' выражений';
    }

    document.querySelectorAll('.eb-pill').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.eb-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            render();
        });
    });

    document.getElementById('shuffleBtn').addEventListener('click', () => {
        order = [...cards].sort(() => Math.random() - 0.5);
        render();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        document.querySelectorAll('.eb-card.flipped').forEach(c => c.classList.remove('flipped'));
    });

    render();
    </script>
